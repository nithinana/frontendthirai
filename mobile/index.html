<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Update Required | Thirai</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Modified variables: Red accent removed, replaced with White */
            --bg-body: #080808;
            --bg-card: #121212;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
            --accent: #ffffff; /* Changed from Red to White */
            --radius: 12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .update-container {
            max-width: 400px;
            width: 100%;
            background: var(--bg-card);
            padding: 40px 30px;
            border-radius: var(--radius);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.05); 
            color: #ffffff; 
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            margin: 0 auto 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 900; 
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .instruction-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 30px;
            /* Changed border color from red to white */
            border-left: 4px solid var(--accent);
            text-align: left;
        }

        .instruction-item {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .instruction-item i {
            color: #ffffff;
            width: 16px;
            text-align: center;
        }

        .instruction-item:last-child { margin-bottom: 0; }

        .btn-update {
            display: block;
            width: 100%;
            background-color: #ffffff;
            color: #000000;
            padding: 14px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .btn-update:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        .footer-link {
            margin-top: 22px;
            display: block;
            font-size: 0.85rem;
            /* Changed from red to muted white for a sleek look */
            color: var(--text-muted);
            font-weight: 600;
            text-decoration: underline;
            text-underline-offset: 4px;
        }
    </style>
</head>
<body>

<div class="update-container">
    <div class="icon-wrapper">
        <i class="fa-solid fa-arrow-up-from-bracket"></i>
    </div>
    
    <h1>Update Required</h1>
    <p>To continue using, update to the latest version by following these steps:</p>

    <div class="instruction-box">
        <div class="instruction-item">
            <i class="fa-solid fa-trash-can"></i>
            <span>Delete the current app</span>
        </div>
        <div class="instruction-item">
            <i class="fa-solid fa-download"></i>
            <span>Reinstall from the main site (thirai.me)</span>
        </div>
    </div>
</div>

</body>
</html>
