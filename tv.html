<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thirai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ============================================================
   THIRAI TV — Complete 10-foot UI rebuild
   Designed for: FireStick / Android TV / Apple TV browsers
   Navigation: D-pad (arrow keys), Enter = select, Back = escape
   ============================================================ */

:root {
  --bg:        #0a0a0a;
  --bg2:       #111111;
  --bg3:       #1a1a1a;
  --surface:   rgba(255,255,255,0.06);
  --border:    rgba(255,255,255,0.08);
  --text:      #ffffff;
  --text2:     rgba(255,255,255,0.60);
  --text3:     rgba(255,255,255,0.35);
  --accent:    #e50914;
  --accent2:   #ff4d57;
  --focus:     #ffffff;

  /* Layout */
  --sidebar-w: 220px;
  --sidebar-collapsed: 72px;
  --hero-h:    56vh;

  /* Typography scale (px for TV clarity) */
  --fs-xs:     13px;
  --fs-sm:     15px;
  --fs-base:   17px;
  --fs-md:     20px;
  --fs-lg:     26px;
  --fs-xl:     38px;
  --fs-hero:   52px;

  /* Spacing */
  --gap-sm:    12px;
  --gap-md:    24px;
  --gap-lg:    40px;
  --row-pad:   var(--sidebar-w);

  /* Animation */
  --t-fast:    120ms;
  --t-med:     220ms;
  --t-slow:    380ms;
}

*, *::before, *::after {
  box-sizing: border-box;
  outline: none;
  margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  /* Remove cursor on TV — pure D-pad experience */
}

img { display: block; max-width: 100%; }
a { text-decoration: none; color: inherit; }
button { font-family: inherit; cursor: pointer; }
.hidden { display: none !important; }

/* ============================================================
   LAYOUT — Left sidebar + main content
   ============================================================ */
.app-layout {
  display: flex;
  min-height: 100vh;
}

/* ============================================================
   SIDEBAR NAV
   ============================================================ */
.sidebar {
  position: fixed;
  left: 0; top: 0; bottom: 0;
  width: var(--sidebar-w);
  z-index: 500;
  display: flex;
  flex-direction: column;
  padding: 32px 0;
  background: linear-gradient(
    90deg,
    rgba(10,10,10,0.98) 0%,
    rgba(10,10,10,0.90) 70%,
    rgba(10,10,10,0) 100%
  );
  transition: width var(--t-med) ease;
  pointer-events: auto;
}

.sidebar-logo {
  padding: 0 20px 36px;
  display: flex;
  align-items: center;
}
.sidebar-logo img {
  height: 26px;
  filter: brightness(1);
  transition: transform var(--t-fast);
}

.sidebar-nav {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 0 12px;
  flex: 1;
}

.nav-btn {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  border-radius: 12px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-family: inherit;
  font-size: var(--fs-base);
  font-weight: 500;
  text-align: left;
  cursor: pointer;
  transition: background var(--t-fast), color var(--t-fast), transform var(--t-fast);
  white-space: nowrap;
  position: relative;
}
.nav-btn .nav-icon {
  width: 22px;
  text-align: center;
  font-size: 18px;
  flex-shrink: 0;
  transition: transform var(--t-fast);
}
.nav-btn .nav-label {
  font-size: var(--fs-base);
  font-weight: 600;
  letter-spacing: -0.01em;
}
.nav-btn:hover,
.nav-btn:focus {
  background: var(--surface);
  color: var(--text);
}
.nav-btn.active {
  background: rgba(255,255,255,0.10);
  color: var(--text);
}
.nav-btn.active::before {
  content: '';
  position: absolute;
  left: 0; top: 25%; bottom: 25%;
  width: 3px;
  background: var(--accent);
  border-radius: 0 3px 3px 0;
}

/* TV Focus — large visible ring */
.nav-btn:focus {
  background: rgba(255,255,255,0.14);
  color: #fff;
  transform: scale(1.02);
  box-shadow: inset 0 0 0 2px rgba(255,255,255,0.3);
}

/* ============================================================
   MAIN CONTENT AREA
   ============================================================ */
.main {
  flex: 1;
  margin-left: var(--sidebar-w);
  min-height: 100vh;
  position: relative;
}

/* ============================================================
   VIEWS — show/hide
   ============================================================ */
.view {
  display: none;
  min-height: 100vh;
}
.view.active { display: block; }

/* ============================================================
   HERO BANNER
   ============================================================ */
.hero {
  position: relative;
  width: 100%;
  height: var(--hero-h);
  min-height: 340px;
  overflow: hidden;
}
.hero-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center 20%;
  transition: background-image 0.6s ease;
}
.hero-gradient {
  position: absolute;
  inset: 0;
  background: 
    linear-gradient(90deg, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0.7) 40%, rgba(10,10,10,0.15) 70%, rgba(10,10,10,0) 100%),
    linear-gradient(0deg, rgba(10,10,10,1) 0%, rgba(10,10,10,0.4) 30%, rgba(10,10,10,0) 60%);
}
.hero-content {
  position: absolute;
  bottom: 0; left: 0;
  padding: var(--gap-lg) var(--gap-lg) var(--gap-lg) var(--gap-md);
  width: 55%;
  max-width: 620px;
}
.hero-logo-img {
  max-width: 280px;
  max-height: 80px;
  width: auto;
  height: auto;
  object-fit: contain;
  margin-bottom: 20px;
  filter: drop-shadow(0 2px 12px rgba(0,0,0,0.7));
}
.hero-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  font-size: var(--fs-sm);
  color: var(--text2);
  font-weight: 500;
}
.hero-meta-dot { color: var(--text3); }
.hero-desc {
  font-size: var(--fs-base);
  color: rgba(255,255,255,0.75);
  line-height: 1.55;
  margin-bottom: 28px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.hero-actions {
  display: flex;
  gap: 14px;
  align-items: center;
}
.btn-watch {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: #fff;
  color: #000;
  padding: 14px 32px;
  border-radius: 8px;
  font-weight: 700;
  font-size: var(--fs-base);
  border: none;
  letter-spacing: -0.01em;
  transition: background var(--t-fast), transform var(--t-fast), box-shadow var(--t-fast);
}
.btn-watch:focus {
  background: #f0f0f0;
  transform: scale(1.05);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.5), 0 8px 30px rgba(0,0,0,0.4);
}
.btn-watch i { font-size: 15px; }

/* ============================================================
   SECTION ROWS
   ============================================================ */
.rows-container {
  padding: 10px 0 60px;
}

.row-section {
  margin-bottom: 8px;
}

.row-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--gap-md) 12px;
}
.row-title {
  font-size: var(--fs-md);
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
}
.row-see-all {
  font-size: var(--fs-sm);
  color: var(--text2);
  background: none;
  border: none;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  padding: 6px 12px;
  border-radius: 6px;
  transition: color var(--t-fast), background var(--t-fast);
}
.row-see-all:hover,
.row-see-all:focus {
  color: var(--text);
  background: var(--surface);
}

.row-scroll {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  overflow-y: visible;
  padding: 8px var(--gap-md) 16px;
  scrollbar-width: none;
  scroll-snap-type: x proximity;
  scroll-behavior: smooth;
}
.row-scroll::-webkit-scrollbar { display: none; }

/* ============================================================
   MOVIE CARD
   ============================================================ */
.card {
  flex: 0 0 auto;
  width: 140px;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
  background: var(--bg3);
  cursor: pointer;
  scroll-snap-align: start;
  transition: transform var(--t-med) cubic-bezier(0.34,1.56,0.64,1),
              box-shadow var(--t-med) ease;
  outline: none;
}
.card img {
  width: 100%;
  aspect-ratio: 2/3;
  object-fit: cover;
  display: block;
  background: var(--bg3);
}
.card-title-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 24px 10px 8px;
  background: linear-gradient(0deg, rgba(0,0,0,0.85), transparent);
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.9);
  opacity: 0;
  transition: opacity var(--t-fast);
  line-height: 1.3;
}

/* TV FOCUS STATE — this is the core TV interaction */
.card:focus {
  transform: scale(1.12) translateY(-4px);
  box-shadow:
    0 0 0 3px var(--focus),
    0 20px 50px rgba(0,0,0,0.8);
  z-index: 10;
}
.card:focus .card-title-bar {
  opacity: 1;
}

/* Continue watching remove button */
.card-remove {
  position: absolute;
  top: 6px; right: 6px;
  width: 24px; height: 24px;
  background: rgba(0,0,0,0.7);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 50%;
  color: white;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity var(--t-fast);
  z-index: 5;
  cursor: pointer;
}
.card:focus .card-remove,
.card:hover .card-remove { opacity: 1; }

/* ============================================================
   SEARCH VIEW
   ============================================================ */
.search-view {
  padding: 32px var(--gap-md);
  max-width: 900px;
}
.search-bar-wrap {
  display: flex;
  gap: 12px;
  margin-bottom: 32px;
}
.search-input {
  flex: 1;
  background: var(--bg3);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  color: var(--text);
  font-family: inherit;
  font-size: var(--fs-md);
  font-weight: 500;
  transition: border-color var(--t-fast), background var(--t-fast);
}
.search-input:focus {
  border-color: rgba(255,255,255,0.35);
  background: var(--bg2);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.08);
}
.search-input::placeholder { color: var(--text3); }
.lang-select {
  background: var(--bg3);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 16px 14px;
  color: var(--text);
  font-family: inherit;
  font-size: var(--fs-sm);
  font-weight: 600;
  min-width: 130px;
  transition: border-color var(--t-fast);
}
.lang-select:focus { border-color: rgba(255,255,255,0.35); }
.btn-search {
  background: var(--accent);
  border: none;
  border-radius: 12px;
  padding: 16px 24px;
  color: white;
  font-family: inherit;
  font-size: var(--fs-md);
  font-weight: 700;
  transition: background var(--t-fast), transform var(--t-fast), box-shadow var(--t-fast);
}
.btn-search:focus {
  background: var(--accent2);
  transform: scale(1.04);
  box-shadow: 0 0 0 3px rgba(229,9,20,0.4);
}

/* ============================================================
   GRID VIEW (search results / filter results / actor movies)
   ============================================================ */
.grid-view {
  padding: 24px var(--gap-md);
}
.grid-title {
  font-size: var(--fs-lg);
  font-weight: 700;
  letter-spacing: -0.03em;
  margin-bottom: 20px;
}
.movie-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 16px;
}

/* ============================================================
   COLLECTIONS VIEW (Actors/Composers)
   ============================================================ */
.collections-view {
  padding: 32px var(--gap-md);
}
.collections-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
}
.collections-title {
  font-size: var(--fs-xl);
  font-weight: 800;
  letter-spacing: -0.04em;
}
.toggle-pill {
  display: flex;
  background: var(--bg3);
  border-radius: 100px;
  padding: 4px;
  gap: 2px;
  border: 1px solid var(--border);
}
.toggle-opt {
  padding: 8px 20px;
  border-radius: 100px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-family: inherit;
  font-size: var(--fs-sm);
  font-weight: 600;
  cursor: pointer;
  transition: all var(--t-fast);
}
.toggle-opt.active {
  background: rgba(255,255,255,0.12);
  color: var(--text);
}
.toggle-opt:focus {
  box-shadow: 0 0 0 2px rgba(255,255,255,0.4);
  color: var(--text);
}

.lang-tabs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}
.lang-tab {
  padding: 9px 18px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-family: inherit;
  font-size: var(--fs-sm);
  font-weight: 600;
  cursor: pointer;
  transition: all var(--t-fast);
}
.lang-tab.active, .lang-tab:focus {
  background: rgba(255,255,255,0.12);
  color: var(--text);
  border-color: rgba(255,255,255,0.25);
}
.lang-tab:focus {
  box-shadow: 0 0 0 2px rgba(255,255,255,0.3);
}

/* Actor/composer cards */
.person-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}
.person-card {
  text-align: center;
  cursor: pointer;
  border-radius: 12px;
  padding: 14px 10px;
  transition: background var(--t-fast), transform var(--t-fast);
  outline: none;
}
.person-card:focus {
  background: var(--surface);
  transform: scale(1.06);
  box-shadow: 0 0 0 2px rgba(255,255,255,0.4);
}
.person-avatar {
  width: 90px; height: 90px;
  border-radius: 50%;
  object-fit: cover;
  margin: 0 auto 10px;
  background: var(--bg3);
  border: 2px solid var(--border);
}
.person-name {
  font-size: var(--fs-xs);
  font-weight: 600;
  color: var(--text2);
  line-height: 1.3;
}

/* ============================================================
   FILTER VIEW
   ============================================================ */
.filter-view {
  padding: 32px var(--gap-md);
  max-width: 700px;
}
.filter-title {
  font-size: var(--fs-xl);
  font-weight: 800;
  letter-spacing: -0.04em;
  margin-bottom: 32px;
}
.filter-section { margin-bottom: 28px; }
.filter-label {
  font-size: var(--fs-xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text3);
  margin-bottom: 12px;
  display: block;
}
.filter-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.chip {
  padding: 10px 18px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-family: inherit;
  font-size: var(--fs-sm);
  font-weight: 600;
  cursor: pointer;
  transition: all var(--t-fast);
}
.chip.active {
  background: rgba(255,255,255,0.14);
  color: var(--text);
  border-color: rgba(255,255,255,0.3);
}
.chip:focus {
  box-shadow: 0 0 0 2px rgba(255,255,255,0.4);
  color: var(--text);
}
.filter-select {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  color: var(--text);
  font-family: inherit;
  font-size: var(--fs-base);
  width: 100%;
}
.filter-select:focus { border-color: rgba(255,255,255,0.35); }

.btn-go {
  display: block;
  width: 100%;
  padding: 16px;
  background: #fff;
  color: #000;
  border: none;
  border-radius: 12px;
  font-family: inherit;
  font-size: var(--fs-base);
  font-weight: 800;
  letter-spacing: -0.01em;
  cursor: pointer;
  margin-top: 8px;
  transition: background var(--t-fast), transform var(--t-fast), box-shadow var(--t-fast);
}
.btn-go:focus {
  transform: scale(1.02);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.3);
}

/* Decade year grid */
.decade-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-top: 12px;
}
.decade-btn {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-family: inherit;
  font-size: var(--fs-sm);
  font-weight: 700;
  cursor: pointer;
  transition: all var(--t-fast);
}
.decade-btn.active,
.decade-btn:focus {
  background: var(--surface);
  color: var(--text);
  border-color: rgba(255,255,255,0.2);
}
.decade-btn:focus { box-shadow: 0 0 0 2px rgba(255,255,255,0.35); }

.year-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.year-btn {
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-family: inherit;
  font-size: var(--fs-xs);
  font-weight: 700;
  cursor: pointer;
  transition: all var(--t-fast);
}
.year-btn:focus {
  background: var(--surface);
  color: var(--text);
  box-shadow: 0 0 0 2px rgba(255,255,255,0.3);
}

/* ============================================================
   LOAD MORE BUTTON
   ============================================================ */
.btn-load-more {
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 20px auto 40px;
  width: 52px; height: 52px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  transition: transform var(--t-fast), box-shadow var(--t-fast), background var(--t-fast);
}
.btn-load-more:focus {
  transform: scale(1.1);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.1);
}
@keyframes spin { to { transform: rotate(360deg); } }
.btn-load-more.loading i { animation: spin 0.8s linear infinite; }

/* ============================================================
   LOADING OVERLAY
   ============================================================ */
#loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 20px;
  transition: opacity 0.5s ease;
}
#loading-overlay img {
  width: 100px;
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
.loading-hint {
  font-size: var(--fs-sm);
  color: var(--text3);
  display: none;
}

/* ============================================================
   EMPTY / ERROR STATES
   ============================================================ */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
  font-size: var(--fs-base);
}

/* ============================================================
   TV-SPECIFIC OVERRIDES
   On TV, the sidebar should always show labels.
   No hover states — focus only.
   ============================================================ */
@media (min-width: 900px) {
  /* Bigger cards for 10-foot viewing */
  .card { width: 160px; }
  .movie-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
}

@media (min-width: 1280px) {
  :root {
    --fs-base: 18px;
    --fs-md:   22px;
    --fs-lg:   28px;
    --fs-xl:   42px;
    --hero-h:  60vh;
  }
  .card { width: 180px; }
  .movie-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
  .sidebar { width: var(--sidebar-w); }
  .main { margin-left: var(--sidebar-w); }
}

@media (min-width: 1920px) {
  /* 4K TV */
  :root {
    --fs-base: 20px;
    --fs-md:   24px;
    --fs-xl:   48px;
    --hero-h:  62vh;
  }
  .card { width: 210px; }
  .movie-grid { grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); }
  .hero-logo-img { max-width: 360px; max-height: 100px; }
}

/* Service status */
#service-overlay {
  position: fixed;
  inset: 0;
  z-index: 8000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(16px);
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.2s, visibility 0s linear 0.2s;
}
#service-overlay.show {
  opacity: 1;
  visibility: visible;
  transition: opacity 0.2s, visibility 0s;
}
.service-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;

<body>

<script>
// ============================================================
// CONSTANTS
// ============================================================
const API_KEY  = '926e94b0f70b5bed8417b679652366ab';
const TMDB     = 'https://api.themoviedb.org/3';
const API_BASE = 'https://api.thirai.me';

// ============================================================
// STATE
// ============================================================
let currentView    = 'home';
let viewHistory    = ['home'];
let searchState    = { query:'', lang:'tamil', page:1, hasMore:false };
let resultsState   = { mode:'', params:{}, page:1, hasMore:false };
let peopleMode     = 'actors';
let peopleLang     = 'tamil';
let searchDebounce = null;

// ============================================================
// VIEW NAVIGATION
// ============================================================
function showView(id, pushHistory=true) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');

  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const navBtn = document.getElementById('nav-' + id);
  if (navBtn) navBtn.classList.add('active');

  if (pushHistory) {
    if (['home','search','people','filter'].includes(id)) {
      viewHistory = [id];
    } else {
      viewHistory.push(id);
    }
  }
  currentView = id;
  window.scrollTo(0,0);

  // Lazy init collections
  if (id === 'people' && !document.getElementById('people-grid').children.length) {
    renderPeople();
  }
}

function goBack() {
  if (viewHistory.length > 1) {
    viewHistory.pop();
    showView(viewHistory[viewHistory.length - 1], false);
  } else {
    showView('home');
  }
}

// ============================================================
// UTILS
// ============================================================
function einthusanToThirai(url) {
  const m = url.match(/\/watch\/([a-zA-Z0-9]+)\//);
  return m ? `https://thirai.me/watch?film=${m[1]}` : url;
}

function makeCard(item) {
  const div = document.createElement('div');
  div.className = 'card';
  div.tabIndex = 0;
  const img = document.createElement('img');
  img.src = item.img_url;
  img.alt = item.title || '';
  img.loading = 'lazy';
  const bar = document.createElement('div');
  bar.className = 'card-title-bar';
  bar.textContent = item.title || '';
  div.appendChild(img);
  div.appendChild(bar);
  div.onclick = () => { window.location.href = einthusanToThirai(item.page_url); };
  div.onkeydown = e => { if (e.key==='Enter') div.onclick(); };
  return div;
}

function setLoading(el, on) {
  if (!el) return;
  if (on) el.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i></div>';
  else el.innerHTML = '';
}

// ============================================================
// HERO BANNER
// ============================================================
async function initBanner() {
  const pool = [...tamilData.movies, ...hindiData.movies, ...malayalamData.movies, ...teluguData.movies];
  const shuffled = pool.sort(() => Math.random()-0.5).slice(0,15);
  for (let i = 0; i < shuffled.length; i++) {
    const ok = await tryHeroItem(shuffled[i]);
    if (ok) return;
  }
  // fallback
  useFallbackHero();
}

async function tryHeroItem(movie) {
  try {
    const r = await fetch(`${TMDB}/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(movie.title)}`);
    const d = await r.json();
    const item = d.results && d.results[0];
    if (!item || !item.backdrop_path) return false;

    const lr = await fetch(`${TMDB}/movie/${item.id}/images?api_key=${API_KEY}&include_image_language=en,null`);
    const ld = await lr.json();
    const logo = ld.logos && (ld.logos.find(x => x.iso_639_1==='en') || ld.logos[0]);
    if (!logo) return false;

    renderHero(item, logo, movie.page_url);
    return true;
  } catch(e) { return false; }
}

function renderHero(item, logo, pageUrl) {
  document.getElementById('hero-bg').style.backgroundImage = `url('https://image.tmdb.org/t/p/original${item.backdrop_path}')`;

  const wrap = document.getElementById('hero-logo-wrap');
  wrap.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${logo.file_path}" class="hero-logo-img" alt="${item.title || ''}">`;

  const meta = document.getElementById('hero-meta');
  const year = item.release_date ? item.release_date.slice(0,4) : '';
  const rating = item.vote_average ? `★ ${item.vote_average.toFixed(1)}` : '';
  meta.innerHTML = [year, rating].filter(Boolean).map((s,i) => `<span>${s}</span>`).join('<span class="hero-meta-dot">·</span>');
  meta.classList.remove('hidden');

  if (item.overview) {
    const desc = document.getElementById('hero-desc');
    desc.textContent = item.overview;
    desc.classList.remove('hidden');
  }

  const btn = document.getElementById('hero-watch-btn');
  btn.href = einthusanToThirai(pageUrl);
  btn.classList.remove('hidden');
}

function useFallbackHero() {
  const fallbacks = [
    { title:"Mersal", logo:"https://image.tmdb.org/t/p/original/udsF8gnPdklZGj74wDBgPSTklkg.png", bg:"https://image.tmdb.org/t/p/original/rx9kyO6YJLpXfFrU934C6i4yYMj.jpg", link:"/watch.html?film=3QoX" },
    { title:"Papanasam", logo:"https://image.tmdb.org/t/p/w500/49Z8fKeYm0DMpdYM8VkP875KiBi.png", bg:"https://image.tmdb.org/t/p/original/e6WQoHeD1lomknxc0a65Ae1sfVw.jpg", link:"/watch?film=2691" }
  ];
  const f = fallbacks[Math.floor(Math.random()*fallbacks.length)];
  document.getElementById('hero-bg').style.backgroundImage = `url('${f.bg}')`;
  document.getElementById('hero-logo-wrap').innerHTML = `<img src="${f.logo}" class="hero-logo-img" alt="${f.title}">`;
  const btn = document.getElementById('hero-watch-btn');
  btn.href = f.link;
  btn.classList.remove('hidden');
}

// ============================================================
// HOME ROWS
// ============================================================
const ROW_LANGS = [
  { id:'row-tamil',    title:'Tamil',    data: () => tamilData.movies,    lang:'tamil'    },
  { id:'row-malayalam',title:'Malayalam',data: () => malayalamData.movies,lang:'malayalam' },
  { id:'row-hindi',    title:'Hindi',    data: () => hindiData.movies,    lang:'hindi'    },
  { id:'row-telugu',   title:'Telugu',   data: () => teluguData.movies,   lang:'telugu'   },
  { id:'row-punjabi',  title:'Punjabi',  data: null, lang:'punjabi',  cache:true },
  { id:'row-marathi',  title:'Marathi',  data: null, lang:'marathi',  cache:true },
  { id:'row-kannada',  title:'Kannada',  data: null, lang:'kannada',  cache:true },
  { id:'row-bengali',  title:'Bengali',  data: null, lang:'bengali',  cache:true },
];

function buildHomeRows() {
  const container = document.getElementById('lang-rows');
  container.innerHTML = '';
  for (const cfg of ROW_LANGS) {
    const section = document.createElement('div');
    section.className = 'row-section';
    section.innerHTML = `
      <div class="row-header">
        <span class="row-title">${cfg.title}</span>
        <button class="row-see-all" onclick="openLangCategory('${cfg.lang}','recent')" tabindex="0">See all ›</button>
      </div>
      <div class="row-scroll" id="${cfg.id}"></div>
    `;
    container.appendChild(section);

    // Fill embedded data immediately
    if (cfg.data) {
      const row = section.querySelector('.row-scroll');
      cfg.data().forEach(m => row.appendChild(makeCard(m)));
    }
  }
}

async function loadCacheRows() {
  for (const cfg of ROW_LANGS.filter(r => r.cache)) {
    const row = document.getElementById(cfg.id);
    if (!row) continue;
    try {
      const r = await fetch(`/cache/${cfg.lang}popular.json`);
      const d = await r.json();
      (d.movies || []).forEach(m => row.appendChild(makeCard(m)));
    } catch(e) {}
  }
}

// ============================================================
// CONTINUE WATCHING
// ============================================================
function renderContinueWatching() {
  const KEY = 'thirai_continue_watching';
  let items = [];
  try { items = JSON.parse(localStorage.getItem(KEY)) || []; } catch {}
  items = items.filter(i => i && i.img && (i.url || i.link));
  const sec = document.getElementById('cw-section');
  const row = document.getElementById('cw-row');
  if (!items.length) { sec.classList.add('hidden'); return; }
  sec.classList.remove('hidden');
  row.innerHTML = '';
  items.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'card';
    div.tabIndex = 0;
    div.style.position = 'relative';
    div.innerHTML = `<img src="${item.img}" alt="${item.title||''}">
      <div class="card-title-bar">${item.title||''}</div>
      <button class="card-remove" tabindex="-1" onclick="removeWatchItem(event,${idx})">&times;</button>`;
    div.onclick = () => { window.location.href = item.url || item.link; };
    div.onkeydown = e => { if(e.key==='Enter') div.onclick(); };
    row.appendChild(div);
  });
}
function removeWatchItem(e, idx) {
  e.stopPropagation();
  const KEY = 'thirai_continue_watching';
  let items = [];
  try { items = JSON.parse(localStorage.getItem(KEY)) || []; } catch {}
  items.splice(idx, 1);
  localStorage.setItem(KEY, JSON.stringify(items));
  renderContinueWatching();
}

// ============================================================
// LANGUAGE CATEGORY (See All)
// ============================================================
async function openLangCategory(lang, category) {
  const title = lang.charAt(0).toUpperCase() + lang.slice(1) + ' • ' + (category==='popular' ? 'Popular' : 'Recent');
  openResultsView(title, 'lang', { lang, category }, 1);
}

// ============================================================
// SEARCH
// ============================================================
function setupSearch() {
  const inp = document.getElementById('search-input');
  inp.addEventListener('input', () => {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => runSearch(1, true), 900);
  });
  inp.addEventListener('keydown', e => { if (e.key==='Enter') { clearTimeout(searchDebounce); runSearch(1,true); }});
}

async function runSearch(page, isNew) {
  const q = document.getElementById('search-input').value.trim();
  const lang = document.getElementById('search-lang').value;
  const grid = document.getElementById('search-results');
  const btn = document.getElementById('load-more-search');
  if (!q) return;
  if (isNew) { searchState = {query:q, lang, page:1, hasMore:false}; grid.innerHTML=''; setLoading(grid,true); btn.classList.add('hidden'); }
  try {
    const r = await fetch(`${API_BASE}/search/${lang}?q=${encodeURIComponent(q)}&page=${page}`);
    const d = await r.json();
    if (isNew) grid.innerHTML = '';
    (d.movies||[]).forEach(m => grid.appendChild(makeCard(m)));
    searchState.page = page;
    searchState.hasMore = d.has_more || false;
    if (!grid.children.length) grid.innerHTML = '<div class="empty-state">No results found.</div>';
    btn.classList.toggle('hidden', !searchState.hasMore);
  } catch(e) {
    grid.innerHTML = '<div class="empty-state">Search failed. Check your connection.</div>';
  }
}

// ============================================================
// PEOPLE (Actors / Actresses / Composers)
// ============================================================
const composersData = {
  tamil:    [{name:"Anirudh Ravichander",code:"3LovLOeCrk"},{name:"A. R. Rahman",code:"2qX0k3esTW"},{name:"Yuvan Shankar Raja",code:"22UUYFMUwi"},{name:"G. V. Prakash Kumar",code:"63W89Vu5jE"},{name:"Santhosh Narayanan",code:"4MHvQzkyOh"},{name:"Vijay Antony",code:"1B1O6mhWbF"},{name:"D. Imman",code:"4ZIjDWAW24"}],
  hindi:    [{name:"A. R. Rahman",code:"2qX0k3esTW"},{name:"Pritam",code:"4oKZLAzqAB"},{name:"Vishal-Shekhar",code:"2aXQ3mzAnH"}],
  malayalam:[{name:"Shaan Rahman",code:"4iBXgUhRoC"},{name:"Sushin Shyam",code:"1Z3kMWb6yA"},{name:"M. Jayachandran",code:"2tPnFmBL0V"}],
  telugu:   [{name:"S. S. Thaman",code:"2eE9aTK0xU"},{name:"Devi Sri Prasad",code:"1xfByvCW2o"},{name:"Mickey J Meyer",code:"3yXGMPjbAT"}],
  kannada:  [{name:"Ravi Basrur",code:"4OjHQpxvJK"}],
  marathi:  [], punjabi:[], bengali:[]
};

function setPeopleMode(mode) {
  peopleMode = mode;
  ['actors','actresses','composers'].forEach(m => {
    document.getElementById('tog-'+m).classList.toggle('active', m===mode);
  });
  renderPeople();
}
function setPeopleLang(lang, btn) {
  peopleLang = lang;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderPeople();
}

async function renderPeople() {
  const grid = document.getElementById('people-grid');
  setLoading(grid, true);

  if (peopleMode === 'composers') {
    const list = composersData[peopleLang] || [];
    grid.innerHTML = '';
    if (!list.length) { grid.innerHTML = '<div class="empty-state">No composers listed for this language.</div>'; return; }
    list.forEach(c => {
      const div = document.createElement('div');
      div.className = 'person-card';
      div.tabIndex = 0;
      div.innerHTML = `<img class="person-avatar" src="https://via.placeholder.com/90" alt="${c.name}" loading="lazy">
        <div class="person-name">${c.name}</div>`;
      div.onclick = () => openPersonMovies(c.code, peopleLang, c.name, 'composer');
      div.onkeydown = e => { if(e.key==='Enter') div.onclick(); };
      grid.appendChild(div);
    });
    return;
  }

  const tmdbList = (actorsData.castData.tmdb[peopleMode] || []).filter(a => a.language === peopleLang);
  grid.innerHTML = '';
  if (!tmdbList.length) { grid.innerHTML = '<div class="empty-state">No people listed.</div>'; return; }

  for (const actor of tmdbList) {
    let imgSrc = 'https://via.placeholder.com/90';
    try {
      const r = await fetch(`${TMDB}/person/${actor.tmdb_id}/images?api_key=${API_KEY}`);
      const d = await r.json();
      if (d.profiles && d.profiles.length) imgSrc = `https://image.tmdb.org/t/p/w185${d.profiles[0].file_path}`;
    } catch(e){}

    const div = document.createElement('div');
    div.className = 'person-card';
    div.tabIndex = 0;
    div.innerHTML = `<img class="person-avatar" src="${imgSrc}" alt="${actor.name}" loading="lazy">
      <div class="person-name">${actor.name}</div>`;
    div.onclick = () => openPersonMovies(actor.actor_code, actor.language, actor.name, 'actor');
    div.onkeydown = e => { if(e.key==='Enter') div.onclick(); };
    grid.appendChild(div);
  }
}

// ============================================================
// RESULTS VIEW (generic — actor movies / lang / filter)
// ============================================================
async function openPersonMovies(code, lang, name, type) {
  openResultsView(name, type==='composer' ? 'composer' : 'actor', { code, lang }, 1);
}

function openResultsView(title, mode, params, page) {
  document.getElementById('results-title').textContent = title;
  document.getElementById('results-grid').innerHTML = '';
  document.getElementById('load-more-results').classList.add('hidden');
  resultsState = { mode, params, page:1, hasMore:false };
  showView('results');
  fetchResults(1, true);
}

async function fetchResults(page, clear) {
  const grid = document.getElementById('results-grid');
  const btn = document.getElementById('load-more-results');
  if (clear) { setLoading(grid, true); }

  const { mode, params } = resultsState;
  try {
    let url;
    if (mode === 'actor')   url = `${API_BASE}/actors/${params.lang}/${params.code}?page=${page}`;
    else if (mode==='composer') url = `${API_BASE}/composers/${params.lang}/${params.code}?page=${page}`;
    else if (mode==='lang') url = `${API_BASE}/language/${params.lang}?category=${params.category}&page=${page}`;
    else if (mode==='year')   url = `${API_BASE}/year/${params.lang}/${params.year}?page=${page}`;
    else if (mode==='decade') url = `${API_BASE}/decade/${params.lang}/${params.decade}?page=${page}`;
    else if (mode==='genre')  url = `${API_BASE}/genre/${params.lang}?action=${params.action||0}&comedy=${params.comedy||0}&romance=${params.romance||0}&storyline=${params.storyline||0}&performance=${params.performance||0}&ratecount=${params.ratecount||75}&page=${page}`;

    const r = await fetch(url);
    const d = await r.json();
    if (clear) grid.innerHTML = '';
    const movies = d.movies || d.results || [];
    movies.forEach(m => grid.appendChild(makeCard(m)));
    resultsState.page = page;
    resultsState.hasMore = d.has_more || false;
    if (!grid.children.length) grid.innerHTML = '<div class="empty-state">No movies found.</div>';
    btn.classList.toggle('hidden', !resultsState.hasMore);
  } catch(e) {
    if (clear) grid.innerHTML = '<div class="empty-state">Failed to load. Check your connection.</div>';
  }
}

function loadMoreResults() {
  if (resultsState.hasMore) fetchResults(resultsState.page+1, false);
}

// ============================================================
// FILTER / BROWSE
// ============================================================
let selectedDecade = null;

function toggleChip(btn) {
  btn.classList.toggle('active');
}

function selectDecade(btn) {
  const decade = parseInt(btn.dataset.decade);
  const wasActive = btn.classList.contains('active');
  document.querySelectorAll('.decade-btn').forEach(b => b.classList.remove('active'));
  const yearRow = document.getElementById('year-row');

  if (wasActive) { selectedDecade = null; yearRow.classList.add('hidden'); return; }

  btn.classList.add('active');
  selectedDecade = decade;

  // Build year buttons
  yearRow.innerHTML = '';
  const now = new Date().getFullYear();
  for (let y = decade; y <= Math.min(decade+9, now); y++) {
    const yb = document.createElement('button');
    yb.className = 'year-btn'; yb.tabIndex = 0; yb.textContent = y;
    yb.onclick = () => {
      const lang = document.getElementById('filter-lang').value;
      openResultsView(`${lang.charAt(0).toUpperCase()+lang.slice(1)} · ${y}`, 'year', {lang, year:y}, 1);
    };
    yearRow.appendChild(yb);
  }
  yearRow.classList.remove('hidden');
}

function runBrowse() {
  const lang = document.getElementById('filter-lang').value;
  const activeChips = Array.from(document.querySelectorAll('#genre-chips .chip.active'));

  if (selectedDecade && !activeChips.length) {
    openResultsView(`${lang.charAt(0).toUpperCase()+lang.slice(1)} · ${selectedDecade}s`, 'decade', {lang, decade:selectedDecade}, 1);
    return;
  }

  const params = { lang, action:0, comedy:0, romance:0, storyline:0, performance:0, ratecount:75 };
  activeChips.forEach(c => { params[c.dataset.attr] = 4; });
  const title = lang.charAt(0).toUpperCase()+lang.slice(1) + (activeChips.length ? ' · ' + activeChips.map(c=>c.textContent).join(', ') : ' · All');
  openResultsView(title, 'genre', params, 1);
}

// ============================================================
// TV D-PAD NAVIGATION
// ============================================================
(function() {
  const FOCUSABLE = [
    'button:not([disabled])',
    '[tabindex="0"]',
    'input:not([disabled])',
    'select:not([disabled])',
    'a[href]'
  ].join(',');

  function getVisibleFocusables(scope) {
    scope = scope || document.body;
    return Array.from(scope.querySelectorAll(FOCUSABLE)).filter(el => {
      if (el.offsetWidth === 0 && el.offsetHeight === 0) return false;
      let p = el;
      while (p) {
        const s = window.getComputedStyle(p);
        if (s.display==='none' || s.visibility==='hidden') return false;
        if (p.classList.contains('hidden')) return false;
        if (p.classList.contains('view') && !p.classList.contains('active')) return false;
        p = p.parentElement;
      }
      return true;
    });
  }

  function nearest(from, candidates, dir) {
    if (!from || !candidates.length) return null;
    const fr = from.getBoundingClientRect();
    const fx = fr.left + fr.width/2;
    const fy = fr.top  + fr.height/2;

    let best = null, bestScore = Infinity;
    for (const el of candidates) {
      if (el === from) continue;
      const r = el.getBoundingClientRect();
      const ex = r.left + r.width/2;
      const ey = r.top  + r.height/2;
      const dx = ex - fx, dy = ey - fy;

      let ok = false;
      if (dir==='right' && dx >  10) ok=true;
      if (dir==='left'  && dx < -10) ok=true;
      if (dir==='down'  && dy >  10) ok=true;
      if (dir==='up'    && dy < -10) ok=true;
      if (!ok) continue;

      // Score: primary axis distance weighted less than cross-axis offset
      const primary   = (dir==='left'||dir==='right') ? Math.abs(dx) : Math.abs(dy);
      const secondary = (dir==='left'||dir==='right') ? Math.abs(dy) : Math.abs(dx);
      const score = primary + secondary * 2.5;
      if (score < bestScore) { bestScore = score; best = el; }
    }
    return best;
  }

  window.addEventListener('keydown', e => {
    const key = e.key;

    // Back / Escape
    if (key === 'Escape' || key === 'GoBack' || key === 'BrowserBack') {
      e.preventDefault(); goBack(); return;
    }
    if (key === 'Backspace') {
      const active = document.activeElement;
      if (!active || active.tagName==='INPUT' || active.tagName==='TEXTAREA') return;
      e.preventDefault(); goBack(); return;
    }

    // Enter on non-input focusable
    if (key === 'Enter') {
      const active = document.activeElement;
      if (active && active !== document.body && active.tagName !== 'INPUT' && active.tagName !== 'SELECT' && active.tagName !== 'TEXTAREA') {
        e.preventDefault(); active.click(); return;
      }
    }

    const dirMap = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down' };
    const dir = dirMap[key];
    if (!dir) return;

    const active = document.activeElement;
    // Allow arrow keys in inputs/selects normally
    if (active && (active.tagName==='INPUT' && (dir==='left'||dir==='right'))) return;
    if (active && active.tagName==='SELECT') return;

    e.preventDefault();

    const all = getVisibleFocusables();
    const target = nearest(active, all, dir);
    if (target) {
      target.focus({ preventScroll: true });
      // For horizontal rows, scroll card into center
      const row = target.closest('.row-scroll');
      if (row) {
        const r = target.getBoundingClientRect();
        const rr = row.getBoundingClientRect();
        const offset = r.left - rr.left - rr.width/2 + r.width/2;
        row.scrollBy({ left: offset, behavior:'smooth' });
      } else {
        target.scrollIntoView({ block:'nearest', inline:'nearest', behavior:'smooth' });
      }
    }
  }, true);

  // Auto-focus hero Watch button after load
  window.addEventListener('load', () => {
    setTimeout(() => {
      const btn = document.getElementById('hero-watch-btn');
      if (btn && !btn.classList.contains('hidden')) btn.focus({ preventScroll:true });
      else {
        const first = getVisibleFocusables()[0];
        if (first) first.focus({ preventScroll:true });
      }
    }, 1000);
  });
})();

// ============================================================
// SERVICE STATUS CHECK
// ============================================================
(function() {
  const ACK_KEY = 'thirai_svc_ack';
  const TTL = 5 * 60 * 1000;

  async function probe(url) {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 5000);
    try { await fetch(url, {method:'GET',mode:'no-cors',cache:'no-store',signal:ctrl.signal}); return true; }
    catch(e) { return false; }
    finally { clearTimeout(t); }
  }

  async function check() {
    try { const v = Number(sessionStorage.getItem(ACK_KEY)||'0'); if (v && Date.now()-v < TTL) return; } catch(e){}
    if (navigator.onLine===false) { showSvcOverlay(); return; }
    const results = await Promise.allSettled([probe('https://api.thirai.me/'), probe('https://einthusan.tv/')]);
    if (results.some(r => r.status==='fulfilled' ? r.value===false : true)) showSvcOverlay();
  }

  function showSvcOverlay() {
    document.getElementById('service-overlay').classList.add('show');
    document.getElementById('service-overlay').removeAttribute('aria-hidden');
    setTimeout(()=>{ const b=document.getElementById('service-ack-btn'); if(b) b.focus({preventScroll:true}); }, 100);
  }

  document.getElementById('service-ack-btn').addEventListener('click', () => {
    try { sessionStorage.setItem(ACK_KEY, String(Date.now())); } catch(e){}
    document.getElementById('service-overlay').classList.remove('show');
  });

  document.addEventListener('visibilitychange', () => { if (document.visibilityState==='visible') check(); });
  window.addEventListener('online', check);

  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', () => { check(); setInterval(check,60000); });
  else { check(); setInterval(check,60000); }
})();

// ============================================================
// LOADING OVERLAY
// ============================================================
function hideLoading() {
  const o = document.getElementById('loading-overlay');
  if (!o) return;
  o.style.opacity = '0';
  setTimeout(() => o.style.display='none', 500);
}

// ============================================================
// INIT
// ============================================================
async function init() {
  renderContinueWatching();
  buildHomeRows();
  setupSearch();
  initBanner();

  // Wakeup API
  fetch('https://thirai-watch.onrender.com').catch(()=>{});

  // Show slow hint
  const slowTimer = setTimeout(() => {
    document.getElementById('slow-hint').style.display = 'block';
  }, 4000);

  // Load cache rows then hide loading
  try { await loadCacheRows(); } catch(e) {}
  clearTimeout(slowTimer);
  hideLoading();
}

document.addEventListener('DOMContentLoaded', init);
</script>
