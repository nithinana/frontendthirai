<script>
  const ORIGINAL_SEARCH_PARAMS = window.location.search;
  (function() {
    const urlParams = new URLSearchParams(window.location.search);
    const movieUrl = urlParams.get('url');
    let needsRewrite = false;
    if (movieUrl) {
      needsRewrite = true;
      const movieCodeMatch = movieUrl.match(/\/watch\/([a-zA-Z0-9]+)/);
      if (movieCodeMatch && movieCodeMatch[1]) {
        const movieCode = movieCodeMatch[1];
        urlParams.set('film', movieCode);
        urlParams.delete('url');
      }
    }
    if (urlParams.has('title')) { needsRewrite = true; urlParams.delete('title'); }
    if (needsRewrite) {
      const newUrl = `${window.location.pathname}?${urlParams.toString()}`;
      window.history.replaceState({ path: newUrl }, '', newUrl);
    }
  })();
</script>

<body>
    <div class="video-player-wrapper" id="videoPlayerWrapper">

        const progressBarHandle = document.getElementById('progressBarHandle');

        const backButton = document.getElementById('backButton');
        const videoPlayerWrapper = document.getElementById('videoPlayerWrapper');
        const fullscreenButton = document.getElementById('fullscreenButton');
        const fullscreenIcon = fullscreenButton.querySelector('i');
        const downloadButton = document.getElementById('downloadButton');
        const movieTitleDisplay = document.getElementById('movieTitleDisplay');
        const magnificationButton = document.getElementById('magnificationButton');
        const magnificationIcon = magnificationButton.querySelector('i');
        const castButton = document.getElementById('castButton');
        const volumeButton = document.getElementById('volumeButton');
        const volumeIcon = volumeButton.querySelector('i');
        const volumeSlider = document.getElementById('volumeSlider');

        let zoomLevel = 1;
        let lastVolume = 1;
        let isDraggingProgressBar = false;
        let controlsTimeout;
        const FADE_TIMEOUT_SECONDS = 7;
        let lastTapTime = 0;
        const DOUBLE_TAP_THRESHOLD_MS = 300;
        const SEEK_TIME = 10;
        let movieKey;
        const CACHE_KEY = 'thirai_continue_watching';

        function saveToContinueWatching(movie) {
            let history = JSON.parse(localStorage.getItem(CACHE_KEY)) || [];
            history = history.filter(item => item.url !== movie.url);
            history.unshift(movie);
            if (history.length > 20) history.pop();
            localStorage.setItem(CACHE_KEY, JSON.stringify(history));
        }

        function formatTime(seconds) {
            if (isNaN(seconds) || seconds < 0) return "00:00";
            seconds = Math.floor(seconds);
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const remainingSeconds = seconds % 60;
            const pad = (num) => String(num).padStart(2, '0');
            if (hours > 0) return `${pad(hours)}:${pad(minutes)}:${pad(remainingSeconds)}`;
            return `${pad(minutes)}:${pad(remainingSeconds)}`;
        }

        function showControls() {
            customControlsOverlay.classList.add('visible');
            clearTimeout(controlsTimeout);
            if (!moviePlayer.paused && !moviePlayer.ended) {
                controlsTimeout = setTimeout(() => {
                    customControlsOverlay.classList.remove('visible');
                }, FADE_TIMEOUT_SECONDS * 1000);
            }
        }

        function hideControls() {
            customControlsOverlay.classList.remove('visible');
            clearTimeout(controlsTimeout);
        }

        function toggleControls() {
            if (customControlsOverlay.classList.contains('visible')) {
                hideControls();
            } else {
                showControls();
            }
        }

        moviePlayer.addEventListener('loadedmetadata', () => {
            if (moviePlayer.paused || moviePlayer.ended || moviePlayer.currentTime === 0) showControls();
            if (moviePlayer.readyState < 3) {
                playPauseIcon.style.display = 'none';
                loadingSpinner.style.display = 'block';
                playPauseButton.disabled = true;
                rewindButton.disabled = true;
                forwardButton.disabled = true;
            }
            if (movieKey) {
                const savedTime = localStorage.getItem(movieKey);
                if (savedTime) moviePlayer.currentTime = parseFloat(savedTime);
            }
        });

        moviePlayer.addEventListener('timeupdate', () => {
            updateProgressBar();
            if (movieKey && !moviePlayer.ended && moviePlayer.currentTime > 0) {
                localStorage.setItem(movieKey, moviePlayer.currentTime.toString());
            }
            // Host sends sync every ~2s
            if (party.isHost && party.roomId && !isSyncingFromRemote) {
                const now = Date.now();
                if (now - party.lastSyncSent > 2000) {
                    party.lastSyncSent = now;
                    party.socket.emit('sync-video', {
                        roomId: party.roomId,
                        state: moviePlayer.paused ? 'paused' : 'playing',
                        time: moviePlayer.currentTime
                    });
                }
            }
        });

        videoPlayerWrapper.addEventListener('click', (event) => {
            const currentTime = new Date().getTime();
            const clickedOnControl = event.target.closest('.control-button') ||
                                     event.target.closest('.top-button') ||
                                     event.target.closest('.progress-bar-container') ||
                                     event.target.closest('.movie-title-display') ||
                                     event.target.closest('.volume-container');
            if (!clickedOnControl && (currentTime - lastTapTime > DOUBLE_TAP_THRESHOLD_MS)) toggleControls();
        });

        playPauseButton.addEventListener('click', () => {
            if (moviePlayer.paused || moviePlayer.ended) {
                moviePlayer.play();
            } else {
                moviePlayer.pause();
            }
            // Immediately broadcast state if host
            if (party.isHost && party.roomId) {
                party.socket.emit('sync-video', {
                    roomId: party.roomId,
                    state: moviePlayer.paused ? 'paused' : 'playing',
                    time: moviePlayer.currentTime
                });
            }
            showControls();
        });

        rewindButton.addEventListener('click', () => {
            if (!rewindButton.disabled) {
                moviePlayer.currentTime = Math.max(0, moviePlayer.currentTime - SEEK_TIME);
                showControls();
            }
        });

        forwardButton.addEventListener('click', () => {
            if (!forwardButton.disabled) {
                moviePlayer.currentTime = Math.min(moviePlayer.duration, moviePlayer.currentTime + SEEK_TIME);
                showControls();
            }
        });

        function updateVolumeIcon(volume) {
            volumeIcon.className = '';
            if (volume === 0 || moviePlayer.muted) {
                volumeIcon.classList.add('bi', 'bi-volume-mute-fill');
            } else if (volume < 0.5) {
                volumeIcon.classList.add('bi', 'bi-volume-down-fill');
            } else {
                volumeIcon.classList.add('bi', 'bi-volume-up-fill');
            }
        }

        volumeSlider.addEventListener('input', (e) => {
            const volume = parseFloat(e.target.value);
            moviePlayer.volume = volume;
            moviePlayer.muted = volume === 0;
            updateVolumeIcon(volume);
            showControls();
        });

        volumeButton.addEventListener('click', () => {
            if (moviePlayer.muted || moviePlayer.volume === 0) {
                moviePlayer.muted = false;
                moviePlayer.volume = lastVolume || 1;
                volumeSlider.value = lastVolume || 1;
            } else {
                lastVolume = moviePlayer.volume;
                moviePlayer.muted = true;
                moviePlayer.volume = 0;
                volumeSlider.value = 0;
            }
            updateVolumeIcon(moviePlayer.volume);
            showControls();
        });

        moviePlayer.addEventListener('waiting', () => {
            playPauseIcon.style.display = 'none';
            loadingSpinner.style.display = 'block';
            playPauseButton.disabled = true; rewindButton.disabled = true; forwardButton.disabled = true;
            showControls();
        });

        moviePlayer.addEventListener('playing', () => {
            loadingSpinner.style.display = 'none'; playPauseIcon.style.display = 'block';
            playPauseButton.disabled = false; rewindButton.disabled = false; forwardButton.disabled = false;
            playPauseIcon.classList.remove('bi-play-fill'); playPauseIcon.classList.add('bi-pause-fill');
            showControls();
        });

        moviePlayer.addEventListener('canplay', () => {
            if (loadingSpinner.style.display === 'block') {
                loadingSpinner.style.display = 'none'; playPauseIcon.style.display = 'block';
                playPauseButton.disabled = false; rewindButton.disabled = false; forwardButton.disabled = false;
            }
            updateProgressBar();
        });

        moviePlayer.addEventListener('play', () => {
            playPauseIcon.classList.remove('bi-play-fill'); playPauseIcon.classList.add('bi-pause-fill');
            loadingSpinner.style.display = 'none'; playPauseIcon.style.display = 'block';
            showControls();
        });

        moviePlayer.addEventListener('pause', () => {
            playPauseIcon.classList.remove('bi-pause-fill'); playPauseIcon.classList.add('bi-play-fill');
            loadingSpinner.style.display = 'none'; playPauseIcon.style.display = 'block';
            showControls();
        });

        moviePlayer.addEventListener('ended', () => {
            playPauseIcon.classList.remove('bi-pause-fill'); playPauseIcon.classList.add('bi-play-fill');
            loadingSpinner.style.display = 'none'; playPauseIcon.style.display = 'block';
            showControls();
            if (movieKey) localStorage.removeItem(movieKey);
        });

        function updateProgressBar() {
            if (!isNaN(moviePlayer.duration) && moviePlayer.duration > 0) {
                const progress = (moviePlayer.currentTime / moviePlayer.duration) * 100;
                progressBar.style.width = `${progress}%`;
                progressBarHandle.style.left = `${progress}%`;
            }
            timeDisplay.textContent = `${formatTime(moviePlayer.currentTime)} / ${formatTime(moviePlayer.duration)}`;
        }

        progressBarContainer.addEventListener('mousedown', (e) => {
            if (moviePlayer.readyState >= 2) { isDraggingProgressBar = true; progressBarContainer.classList.add('dragging'); updateSeek(e); showControls(); }
        });
        progressBarContainer.addEventListener('touchstart', (e) => {
            if (moviePlayer.readyState >= 2) { isDraggingProgressBar = true; progressBarContainer.classList.add('dragging'); updateSeek(e.touches[0]); showControls(); }
        });
        document.addEventListener('mousemove', (e) => { if (isDraggingProgressBar) updateSeek(e); });
        document.addEventListener('touchmove', (e) => { if (isDraggingProgressBar) updateSeek(e.touches[0]); });
        document.addEventListener('mouseup', () => {
            if (isDraggingProgressBar) { isDraggingProgressBar = false; progressBarContainer.classList.remove('dragging'); showControls(); }
        });
        document.addEventListener('touchend', () => {
            if (isDraggingProgressBar) { isDraggingProgressBar = false; progressBarContainer.classList.remove('dragging'); showControls(); }
        });

        function updateSeek(e) {
            const rect = progressBarContainer.getBoundingClientRect();
            let clientX = e.clientX || e.pageX;
            clientX = Math.max(rect.left, Math.min(clientX, rect.right));
            const percent = (clientX - rect.left) / rect.width;
            if (!isNaN(moviePlayer.duration)) moviePlayer.currentTime = moviePlayer.duration * percent;
            updateProgressBar();
        }

        backButton.addEventListener('click', () => { window.history.back(); });

        fullscreenButton.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                if (videoPlayerWrapper.requestFullscreen) videoPlayerWrapper.requestFullscreen();
                else if (videoPlayerWrapper.webkitRequestFullscreen) videoPlayerWrapper.webkitRequestFullscreen();
                else if (videoPlayerWrapper.msRequestFullscreen) videoPlayerWrapper.msRequestFullscreen();
            }
            showControls();
        });

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fullscreenIcon.classList.remove('bi-arrows-fullscreen'); fullscreenIcon.classList.add('bi-arrows-angle-contract');
                if (!moviePlayer.paused) hideControls();
            } else {
                fullscreenIcon.classList.remove('bi-arrows-angle-contract'); fullscreenIcon.classList.add('bi-arrows-fullscreen');
                showControls();
            }
        });

        magnificationButton.addEventListener('click', () => {
            switch (zoomLevel) {
                case 1:
                    moviePlayer.style.transform = 'scale(0.9)';
                    magnificationIcon.classList.remove('bi-zoom-in', 'bi-search'); magnificationIcon.classList.add('bi-zoom-out');
                    zoomLevel = 0; break;
                case 0:
                    moviePlayer.style.transform = 'scale(1.2)';
                    magnificationIcon.classList.remove('bi-zoom-out'); magnificationIcon.classList.add('bi-search');
                    zoomLevel = 2; break;
                case 2:
                    moviePlayer.style.transform = 'scale(1)';
                    magnificationIcon.classList.remove('bi-search'); magnificationIcon.classList.add('bi-zoom-in');
                    zoomLevel = 1; break;
            }
            showControls();
        });

        if (window.WebKitPlaybackTargetAvailabilityEvent) {
            moviePlayer.addEventListener('webkitplaybacktargetavailabilitychanged', function(event) {
                if (event.availability === "available") {
                    castButton.style.display = 'flex';
                    castButton.onclick = function() { moviePlayer.webkitShowPlaybackTargetPicker(); };
                } else if (!window.chrome || !window.chrome.cast || !window.chrome.cast.isAvailable) {
                    castButton.style.display = 'none';
                }
            });
        }

        window['__onGCastApiAvailable'] = function(isAvailable) {
            if (isAvailable) {
                cast.framework.CastContext.getInstance().setOptions({
                    receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
                    autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
                });
                castButton.style.display = 'flex';
                castButton.addEventListener('click', function() {
                    if (!moviePlayer.webkitShowPlaybackTargetPicker) cast.framework.CastContext.getInstance().requestSession();
                });
            }
        };

        document.addEventListener('touchend', (event) => {
            const clickedOnControl = event.target.closest('.control-button') || event.target.closest('.top-button') ||
                                     event.target.closest('.progress-bar-container') || event.target.closest('.movie-title-display') ||
                                     event.target.closest('.volume-container');
            if (clickedOnControl) return;
            if (moviePlayer.paused || moviePlayer.ended || moviePlayer.readyState < 2) {
                const currentTime = new Date().getTime();
                if (currentTime - lastTapTime > DOUBLE_TAP_THRESHOLD_MS) toggleControls();
                lastTapTime = currentTime; return;
            }
            const currentTime = new Date().getTime();
            const tapX = event.changedTouches[0].clientX;
            if (currentTime - lastTapTime < DOUBLE_TAP_THRESHOLD_MS) {
                const videoWidth = videoPlayerWrapper.offsetWidth;
                if (tapX < videoWidth / 2) moviePlayer.currentTime = Math.max(0, moviePlayer.currentTime - SEEK_TIME);
                else moviePlayer.currentTime = Math.min(moviePlayer.duration, moviePlayer.currentTime + SEEK_TIME);
                lastTapTime = 0; showControls();
            } else {
                lastTapTime = currentTime; toggleControls();
            }
        });

        document.addEventListener('keydown', (event) => {
            const isInputFocused = document.activeElement && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA');
            if (isInputFocused) return;
            switch (event.key) {
                case ' ': event.preventDefault(); playPauseButton.click(); break;
                case 'ArrowLeft': event.preventDefault(); rewindButton.click(); break;
                case 'ArrowRight': event.preventDefault(); forwardButton.click(); break;
                case 'f': case 'F': event.preventDefault(); fullscreenButton.click(); break;
                case 'm': case 'M': event.preventDefault(); volumeButton.click(); break;
            }
        });

        async function fetchMovieSource() {
            playPauseIcon.style.display = 'none'; loadingSpinner.style.display = 'block';
            playPauseButton.disabled = true; rewindButton.disabled = true; forwardButton.disabled = true;

            const urlParams = new URLSearchParams(window.location.search);
            const filmCode = urlParams.get('film');
            let movieUrl = urlParams.get('url');
            if (filmCode) movieUrl = `https://einthusan.tv/movie/watch/${filmCode}/`;

            if (movieUrl) {
                try {
                    const response = await fetch(`https://api.thirai.me/watch?url=${encodeURIComponent(movieUrl)}`);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const data = await response.json();
                    if (data && data.video_url) {
                        moviePlayer.src = data.video_url;
                        moviePlayer.load();
                        downloadButton.href = data.video_url;
                        downloadButton.style.display = 'flex';
                        movieTitleDisplay.textContent = data.title;
                        document.title = data.title;
                        const currentUrl = `./watch${ORIGINAL_SEARCH_PARAMS}`;
                        const cacheObj = { title: data.title, img: data.img_url || 'https://via.placeholder.com/400x600?text=No+Image', url: currentUrl };
                        saveToContinueWatching(cacheObj);
                        movieKey = `movie_progress_${data.title}`;
                        const savedTime = localStorage.getItem(movieKey);
                        if (savedTime) moviePlayer.currentTime = parseFloat(savedTime);
                        updateProgressBar();
                    } else {
                        loadingSpinner.style.display = 'none'; playPauseIcon.style.display = 'block';
                    }
                } catch (error) {
                    loadingSpinner.style.display = 'none'; playPauseIcon.style.display = 'block';
                }
            } else {
                loadingSpinner.style.display = 'none'; playPauseIcon.style.display = 'block';
            }

            // Auto-join party from URL if present
            const partyCode = urlParams.get('party');
            if (partyCode) {
                setTimeout(() => openModal('join', partyCode), 1200);
            }
        }

        document.addEventListener('DOMContentLoaded', fetchMovieSource);
        document.addEventListener('DOMContentLoaded', showControls);

        moviePlayer.addEventListener('canplaythrough', () => {
            if (loadingSpinner.style.display === 'block') {
                loadingSpinner.style.display = 'none'; playPauseIcon.style.display = 'block';
                playPauseButton.disabled = false; rewindButton.disabled = false; forwardButton.disabled = false;
            }
        });


        // ===================== WATCH PARTY CODE =====================

        const BACKEND = 'https://watchpartybackend-b5a2.onrender.com';

        const party = {
            socket: null,
            roomId: null,
            isHost: false,
            myName: '',
            lastSyncSent: 0,
        };

        let isSyncingFromRemote = false;
        let syncTimeout = null;

        // UI elements
        const partyButton = document.getElementById('partyButton');
        const partyBadge = document.getElementById('partyBadge');
        const partyModalBackdrop = document.getElementById('partyModalBackdrop');
        const screenLobby = document.getElementById('screenLobby');
        const screenParty = document.getElementById('screenParty');
        const inputMyName = document.getElementById('inputMyName');
        const inputJoinCode = document.getElementById('inputJoinCode');
        const btnCreateParty = document.getElementById('btnCreateParty');
        const btnJoinParty = document.getElementById('btnJoinParty');
        const btnCloseLobby = document.getElementById('btnCloseLobby');
        const btnCloseParty = document.getElementById('btnCloseParty');
        const btnLeaveParty = document.getElementById('btnLeaveParty');
        const partyUsersList = document.getElementById('partyUsersList');
        const partyUsersCount = document.getElementById('partyUsersCount');
        const partyRoleLabel = document.getElementById('partyRoleLabel');
        const leaveLabel = document.getElementById('leaveLabel');
        const partyShareLink = document.getElementById('partyShareLink');
        const partyCodeDisplay = document.getElementById('partyCodeDisplay');
        const btnCopyLink = document.getElementById('btnCopyLink');
        const syncIndicator = document.getElementById('syncIndicator');
        const syncLabel = document.getElementById('syncLabel');
        const partyToast = document.getElementById('partyToast');

        // Load saved name
        const savedName = localStorage.getItem('thirai_party_name');
        if (savedName) inputMyName.value = savedName;

        // Auto uppercase room code input
        inputJoinCode.addEventListener('input', () => { inputJoinCode.value = inputJoinCode.value.toUpperCase(); });

        function showToast(msg, duration = 2500) {
            partyToast.textContent = msg;
            partyToast.classList.add('show');
            clearTimeout(partyToast._t);
            partyToast._t = setTimeout(() => partyToast.classList.remove('show'), duration);
        }

        function openModal(mode = 'lobby', prefillCode = '') {
            if (mode === 'join' && prefillCode) inputJoinCode.value = prefillCode.toUpperCase();
            partyModalBackdrop.classList.add('open');
        }

        function closeModal() {
            partyModalBackdrop.classList.remove('open');
        }

        function showScreen(name) {
            screenLobby.classList.toggle('active', name === 'lobby');
            screenParty.classList.toggle('active', name === 'party');
        }

        function generateRoomId() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let id = '';
            for (let i = 0; i < 6; i++) id += chars[Math.floor(Math.random() * chars.length)];
            return id;
        }

        function buildInviteLink(roomId) {
            const url = new URL(window.location.href);
            url.searchParams.set('party', roomId);
            return url.toString();
        }

        function renderUsers(users) {
            partyUsersList.innerHTML = '';
            users.forEach(u => {
                const item = document.createElement('div');
                item.className = 'party-user-item';
                const initials = u.name.trim().split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase() || '?';
                item.innerHTML = `
                    <div class="party-user-avatar">${initials}</div>
                    <div class="party-user-name">${escHtml(u.name)}</div>
                    ${u.isHost ? '<span class="party-user-badge">HOST</span>' : ''}
                `;
                partyUsersList.appendChild(item);
            });
            const n = users.length;
            partyUsersCount.textContent = `${n} watching`;
        }

        function escHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function setSyncState(active, label = 'Syncing') {
            if (active) {
                syncIndicator.classList.add('visible');
                syncLabel.textContent = label;
            } else {
                syncIndicator.classList.remove('visible');
            }
        }

        function connectSocket() {
            if (party.socket && party.socket.connected) return Promise.resolve();
            return new Promise((resolve) => {
                party.socket = io(BACKEND, { transports: ['websocket', 'polling'] });
                party.socket.on('connect', () => resolve());
                party.socket.on('connect_error', () => showToast('⚠️ Connection failed'));

                party.socket.on('user-list', (users) => {
                    // Mark host
                    const enriched = users.map((u, i) => ({ ...u, isHost: i === 0 }));
                    renderUsers(enriched);
                    // Update badge
                    if (party.roomId) {
                        const n = users.length;
                        partyBadge.style.display = n > 0 ? 'block' : 'none';
                    }
                });

                party.socket.on('video-update', (data) => {
                    if (party.isHost) return; // hosts ignore incoming sync
                    isSyncingFromRemote = true;
                    clearTimeout(syncTimeout);

                    const diff = Math.abs(moviePlayer.currentTime - data.time);
                    if (diff > 1.5) moviePlayer.currentTime = data.time;

                    if (data.state === 'playing' && moviePlayer.paused) {
                        moviePlayer.play().catch(() => {});
                    } else if (data.state === 'paused' && !moviePlayer.paused) {
                        moviePlayer.pause();
                    }

                    setSyncState(true, 'Live');
                    syncTimeout = setTimeout(() => { isSyncingFromRemote = false; }, 300);
                });

                party.socket.on('party-ended', () => {
                    showToast('🎬 The host ended the party');
                    leavePartyCleanup();
                    showScreen('lobby');
                    openModal('lobby');
                });

                party.socket.on('error', (msg) => {
                    showToast('❌ ' + msg);
                });
            });
        }

        async function createParty() {
            const name = inputMyName.value.trim() || 'Host';
            party.myName = name;
            localStorage.setItem('thirai_party_name', name);

            btnCreateParty.disabled = true;
            btnCreateParty.textContent = 'Connecting…';

            await connectSocket();

            const roomId = generateRoomId();
            party.roomId = roomId;
            party.isHost = true;

            party.socket.emit('create-room', {
                roomId,
                hostName: name,
                movieUrl: window.location.href
            });

            party.socket.once('room-created', () => {
                partyRoleLabel.textContent = 'HOST';
                partyRoleLabel.style.color = '#fbbf24';
                leaveLabel.textContent = 'End Party';
                partyCodeDisplay.textContent = roomId;
                partyShareLink.value = buildInviteLink(roomId);
                setSyncState(true, 'Broadcasting');
                showScreen('party');
                partyBadge.style.display = 'block';
                btnCreateParty.disabled = false;
                btnCreateParty.textContent = '＋ Create Party';
                showToast('🎉 Party created! Share the code.');
            });
        }

        async function joinParty(code) {
            const roomId = (code || inputJoinCode.value).trim().toUpperCase();
            if (!roomId) { showToast('Enter a room code'); return; }
            const name = inputMyName.value.trim() || 'Guest';
            party.myName = name;
            localStorage.setItem('thirai_party_name', name);

            btnJoinParty.disabled = true;
            btnJoinParty.textContent = 'Joining…';

            await connectSocket();

            party.roomId = roomId;
            party.isHost = false;

            party.socket.emit('join-room', { roomId, userName: name });

            party.socket.once('joined-room', () => {
                partyRoleLabel.textContent = 'VIEWER';
                partyRoleLabel.style.color = '#a5b4fc';
                leaveLabel.textContent = 'Leave Party';
                partyCodeDisplay.textContent = roomId;
                partyShareLink.value = buildInviteLink(roomId);
                setSyncState(true, 'Syncing');
                showScreen('party');
                partyBadge.style.display = 'block';
                btnJoinParty.disabled = false;
                btnJoinParty.textContent = 'Join';
                showToast('✅ Joined the party!');
            });

            // If joined-room not received (bad code), timeout
            setTimeout(() => {
                if (!screenParty.classList.contains('active')) {
                    btnJoinParty.disabled = false;
                    btnJoinParty.textContent = 'Join';
                    party.roomId = null;
                }
            }, 5000);
        }

        function leavePartyCleanup() {
            if (party.socket && party.roomId) {
                if (party.isHost) {
                    party.socket.emit('stop-party', party.roomId);
                } else {
                    party.socket.emit('leave-room', { roomId: party.roomId });
                }
            }
            party.roomId = null;
            party.isHost = false;
            partyBadge.style.display = 'none';
            setSyncState(false);
            partyUsersList.innerHTML = '';
        }

        // Button wiring
        partyButton.addEventListener('click', () => {
            if (party.roomId) {
                showScreen('party');
            } else {
                showScreen('lobby');
            }
            openModal();
            showControls();
        });

        btnCreateParty.addEventListener('click', createParty);
        btnJoinParty.addEventListener('click', () => joinParty());
        btnCloseLobby.addEventListener('click', closeModal);
        btnCloseParty.addEventListener('click', closeModal);

        btnLeaveParty.addEventListener('click', () => {
            leavePartyCleanup();
            showScreen('lobby');
            showToast('👋 Left the party');
            closeModal();
        });

        btnCopyLink.addEventListener('click', () => {
            const link = partyShareLink.value;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(link).then(() => showToast('📋 Link copied!'));
            } else {
                partyShareLink.select();
                document.execCommand('copy');
                showToast('📋 Copied!');
            }
        });

        // Close modal on backdrop click
        partyModalBackdrop.addEventListener('click', (e) => {
            if (e.target === partyModalBackdrop) closeModal();
        });

        // Allow Enter key in inputs
        inputJoinCode.addEventListener('keydown', (e) => { if (e.key === 'Enter') joinParty(); });
        inputMyName.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (inputJoinCode.value.trim()) joinParty(); else createParty();
            }
        });

        // Send sync on seek (host only)
        moviePlayer.addEventListener('seeked', () => {
            if (party.isHost && party.roomId && !isSyncingFromRemote) {
                party.socket.emit('sync-video', {
                    roomId: party.roomId,
                    state: moviePlayer.paused ? 'paused' : 'playing',
                    time: moviePlayer.currentTime
                });
            }
        });
    </script>
</body>
</html>
