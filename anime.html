<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Thirai</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
            font-family: -apple-system, system-ui, sans-serif;
        }
        #video-target {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100dvh;
            z-index: 1;
        }
        iframe { width: 100%; height: 100%; border: none; }
        .back-btn {
            position: fixed;
            top: env(safe-area-inset-top, 20px);
            left: env(safe-area-inset-left, 20px);
            z-index: 10;
            padding: 12px;
            cursor: pointer;
            transition: opacity 0.4s ease, transform 0.2s ease;
            opacity: 0;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
        }
        .back-btn svg {
            width: 26px; height: 26px; fill: none;
            stroke: #fff; stroke-width: 2.5;
            filter: drop-shadow(0 0 6px rgba(0,0,0,0.9));
        }
        .back-btn.visible { opacity: 0.8; }
    </style>
</head>
<body>

<a href="javascript:history.back()" class="back-btn" id="back-link">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
</a>

<div id="video-target"></div>

<script>
    const params = new URLSearchParams(window.location.search);
    let id = params.get('id');
    let ep = params.get('ep') || '1';
    let isDub = params.get('dub') === 'true';

    async function updateMetadata(targetId, targetEp) {
        const query = `query ($id: Int) { Media (id: $id, type: ANIME) { title { english romaji } } }`;
        try {
            const response = await fetch('https://graphql.anilist.co', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({ query, variables: { id: parseInt(targetId) } })
            });
            const data = await response.json();
            const title = data.data.Media.title.english || data.data.Media.title.romaji;
            document.title = `${title} - E${targetEp} ${isDub ? '(Dub)' : '(Sub)'}`;
        } catch (err) {
            document.title = `Thirai - ${targetId}`;
        }
    }

    function loadPlayer() {
        if (!id) return;
        updateMetadata(id, ep);

        // Construct URL with hidden parameters
        const baseUrl = `https://player.videasy.net/anime/${id}/${ep}`;
        const queryParts = [];
        if (isDub) queryParts.push('dub=true');
        queryParts.push('episodeSelector=true');
        queryParts.push('autoplayNextEpisode=true');
        
        const finalUrl = `${baseUrl}?${queryParts.join('&')}`;
        
        document.getElementById('video-target').innerHTML = `
            <iframe id="anime-player" src="${finalUrl}" allowfullscreen allow="autoplay; fullscreen"></iframe>`;
    }

    // Listen for episode changes from the player
    window.addEventListener('message', (event) => {
        // Many players emit an event when the episode changes
        if (event.data && event.data.type === 'episodeChanged') {
            const newEp = event.data.episode;
            if (newEp) {
                ep = newEp;
                // Update browser URL without refreshing
                params.set('ep', newEp);
                window.history.replaceState({}, '', `${window.location.pathname}?${params.toString()}`);
                // Update tab title
                updateMetadata(id, newEp);
            }
        }
    });

    // UI Toggle Logic
    const backBtn = document.getElementById('back-link');
    let hideTimeout;
    function wakeUI() {
        backBtn.classList.add('visible');
        clearTimeout(hideTimeout);
        hideTimeout = setTimeout(() => backBtn.classList.remove('visible'), 3000);
    }

    ['touchstart', 'mousemove'].forEach(evt => document.addEventListener(evt, wakeUI, { passive: true }));
    
    loadPlayer();
    wakeUI();
</script>

</body>
</html>
