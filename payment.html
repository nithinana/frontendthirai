<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Authenticator - Thirai</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        :root {
            --bg-body: #080808;
            --bg-card: #121212;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
            --accent: #ffffff; 
            --radius: 22px;
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--radius);
            padding: 40px 24px;
            text-align: center;
            box-shadow: 0 12px 40px rgba(0,0,0,0.55);
        }

        .icon-badge {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.05);
            border-radius: 18px;
            display: inline-grid;
            place-items: center;
            font-size: 24px;
            margin: 0 auto 20px auto;
            color: var(--accent);
        }

        h2 { font-size: 1.5rem; font-weight: 900; margin: 0 0 8px; }
        p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px; line-height: 1.4; }

        /* Payment Form Styling */
        #payment-area { margin-top: 20px; text-align: left; }
        #card-element {
            background: rgba(255,255,255,0.04);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 15px;
        }
        #card-errors { color: #ff4b4b; font-size: 0.8rem; margin-bottom: 10px; text-align: center; }

        /* Guarded Content */
        .guarded-content { transition: filter 0.6s ease; }
        .blurred { filter: blur(18px); pointer-events: none; user-select: none; }

        .otp-display { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .digit-box {
            width: 45px; height: 55px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: 900;
        }

        .timer-container { margin-bottom: 30px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        .timer-bar { height: 100%; background: var(--accent); width: 100%; transition: width 1s linear; }

        .btn { width: 100%; padding: 16px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-pay { background: #635bff; color: white; }
        .btn-copy { background: white; color: black; margin-top: 10px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .hidden { display: none !important; }
        .toast { position: fixed; bottom: 30px; background: #fff; color: #000; padding: 10px 20px; border-radius: 30px; font-weight: 600; opacity: 0; transition: opacity 0.3s; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="icon-badge" id="mainIcon"><i class="fas fa-lock"></i></div>
    <h2 id="mainTitle">Unlock Access</h2>
    <p id="mainDesc">One-time payment of £0.99 required to view your secure codes.</p>

    <div id="guardedContent" class="guarded-content blurred">
        <div class="otp-display">
            <div class="digit-box">-</div><div class="digit-box">-</div><div class="digit-box">-</div>
            <div class="digit-box">-</div><div class="digit-box">-</div><div class="digit-box">-</div>
        </div>
        <div class="timer-container"><div class="timer-bar" id="timerBar"></div></div>
    </div>

    <div id="payment-area">
        <form id="payment-form">
            <div id="card-element"></div>
            <div id="card-errors" role="alert"></div>
            <button class="btn btn-pay" id="pay-button">Pay £0.99 & Unlock</button>
        </form>
    </div>

    <div id="controls-area" class="hidden">
        <button class="btn btn-copy" onclick="copyCode()"><i class="far fa-copy"></i> Copy Active Code</button>
    </div>
</div>

<div class="toast" id="toast">Code copied!</div>

<script>
    // 2. CONFIGURATION - REPLACE pk_live_... WITH YOUR KEY
    const STRIPE_KEY = 'pk_live_51T8RqqEl6VuxCSbL7Q7DPY3hEMYp4k2pd7mZSxyEX0YgkGF8MRRBxhepMedzrj85ILghYWd35Gzwt6VwMbggFjhj00bEWCnqFh'; 
    const SECRET = "OCS5GUUKYB5B7E2SJETYAZICUPELSHNEXEQC2Z6X63SG6KXTG5NQ";
    let currentCode = "";

    // 3. INITIALIZE STRIPE
    const stripe = Stripe(STRIPE_KEY);
    const elements = stripe.elements();
    const card = elements.create('card', {
        style: { base: { color: '#ffffff', fontSize: '16px', '::placeholder': { color: '#666' } } }
    });
    card.mount('#card-element');

    // 4. PAYMENT LOGIC
    document.getElementById('payment-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('pay-button');
        btn.disabled = true;
        btn.innerText = "Processing...";

        const {paymentMethod, error} = await stripe.createPaymentMethod('card', card);

        if (error) {
            document.getElementById('card-errors').textContent = error.message;
            btn.disabled = false;
            btn.innerText = "Pay £0.99 & Unlock";
        } else {
            unlockSite();
        }
    });

    function unlockSite() {
        localStorage.setItem('thirai_access', 'true');
        document.getElementById('payment-area').classList.add('hidden');
        document.getElementById('guardedContent').classList.remove('blurred');
        document.getElementById('controls-area').classList.remove('hidden');
        document.getElementById('mainIcon').innerHTML = '<i class="fas fa-shield-check"></i>';
        document.getElementById('mainTitle').innerText = "Authenticator Active";
        document.getElementById('mainDesc').innerText = "Your 2FA codes are now visible.";
        startGenerator();
    }

    // 5. TOTP GENERATOR
    function base32ToBytes(base32) {
        const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
        const cleaned = base32.replace(/=+$/, '').replace(/\s+/g, '').toUpperCase();
        let bits = '';
        for (const char of cleaned) {
            const val = alphabet.indexOf(char);
            if (val === -1) throw new Error('Invalid Secret');
            bits += val.toString(2).padStart(5, '0');
        }
        const bytes = [];
        for (let i = 0; i + 8 <= bits.length; i += 8) bytes.push(parseInt(bits.slice(i, i + 8), 2));
        return new Uint8Array(bytes);
    }

    async function generateTOTP(secret) {
        const key = base32ToBytes(secret);
        const epoch = Math.round(new Date().getTime() / 1000.0);
        const time = Math.floor(epoch / 30);
        const msg = new Uint8Array(8);
        let tempTime = time;
        for (let i = 7; i >= 0; i--) { msg[i] = tempTime & 0xff; tempTime >>= 8; }
        const cryptoKey = await crypto.subtle.importKey('raw', key, { name: 'HMAC', hash: 'SHA-1' }, false, ['sign']);
        const hmac = await crypto.subtle.sign('HMAC', cryptoKey, msg);
        const hash = new Uint8Array(hmac);
        const offset = hash[hash.length - 1] & 0xf;
        const binary = ((hash[offset] & 0x7f) << 24) | ((hash[offset + 1] & 0xff) << 16) | ((hash[offset + 2] & 0xff) << 8) | (hash[offset + 3] & 0xff);
        return (binary % 1000000).toString().padStart(6, '0');
    }

    async function updateUI() {
        currentCode = await generateTOTP(SECRET);
        const digits = currentCode.split('');
        const boxes = document.querySelectorAll('.digit-box');
        boxes.forEach((box, i) => box.textContent = digits[i]);
        const remaining = 30 - (new Date().getSeconds() % 30);
        document.getElementById('timerBar').style.width = (remaining / 30 * 100) + "%";
    }

    function startGenerator() {
        updateUI();
        setInterval(updateUI, 1000);
    }

    function copyCode() {
        navigator.clipboard.writeText(currentCode);
        const t = document.getElementById('toast');
        t.style.opacity = "1";
        setTimeout(() => t.style.opacity = "0", 2000);
    }

    if (localStorage.getItem('thirai_access') === 'true') unlockSite();
</script>
</body>
</html>
