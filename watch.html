  const ORIGINAL_SEARCH_PARAMS = window.location.search;
  (function() {
    const urlParams = new URLSearchParams(window.location.search);
    const movieUrl = urlParams.get('url');
    let needsRewrite = false;
    if (movieUrl) {
      needsRewrite = true;
      const movieCodeMatch = movieUrl.match(/\/watch\/([a-zA-Z0-9]+)/);
      if (movieCodeMatch && movieCodeMatch[1]) {
        const movieCode = movieCodeMatch[1];
        urlParams.set('film', movieCode);
        urlParams.delete('url');
      }
    }
    if (urlParams.has('title')) { needsRewrite = true; urlParams.delete('title'); }
    if (needsRewrite) {
      const newUrl = `${window.location.pathname}?${urlParams.toString()}`;
      window.history.replaceState({ path: newUrl }, '', newUrl);
    }
  })();
</script>

            .party-modal .party-subtitle { font-size: 0.75rem; margin-bottom: 10px; }
            .party-label { font-size: 0.7rem; margin-bottom: 4px; }
            .party-input { padding: 9px 11px; font-size: 0.85rem; border-radius: 10px; }
            .party-btn { padding: 10px; font-size: 0.85rem; border-radius: 10px; }
            .party-divider { margin: 8px 0; }
            .party-users-list { max-height: 70px; }
            .party-movie-card { padding: 7px 9px; margin-bottom: 10px; gap: 9px; }
            .party-movie-poster { width: 32px; height: 44px; }
            .party-share-row { margin-bottom: 10px !important; }
        }

        /* ===== MOBILE PORTRAIT: bottom-sheet modal ===== */
        @media (max-width: 600px) and (orientation: portrait) {

            /* Backdrop aligns to bottom */
            .party-modal-backdrop {
                align-items: flex-end;
                padding: 0;
            }

            /* Modal becomes a bottom sheet */
            .party-modal {
                width: 100%;
                max-width: 100%;
                max-height: 88vh;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                border-radius: 20px 20px 0 0;
                padding: 20px 18px 32px;
                transform: translateY(40px);
            }
            .party-modal-backdrop.open .party-modal { transform: translateY(0); }

            /* Drag handle indicator */
            .party-modal::before {
                content: '';
                display: block;
                width: 36px;
                height: 4px;
                background: rgba(255,255,255,0.15);
                border-radius: 2px;
                margin: 0 auto 16px;
            }

            /* Tighten up vertical spacing */
            .party-modal-icon {
                width: 40px; height: 40px; font-size: 1.1rem; margin-bottom: 10px;
            }
            .party-modal h2 { font-size: 1.05rem; }
            .party-modal .party-subtitle { margin-bottom: 14px; font-size: 0.8rem; }

            .party-input { padding: 11px 13px; font-size: 0.9rem; }

            .party-btn { padding: 12px; font-size: 0.9rem; }

            .party-divider { margin: 12px 0; }

            /* Reduce users list height */
            .party-users-list { max-height: 100px; }

            /* Tighten movie card */
            .party-movie-card { padding: 8px 10px; margin-bottom: 12px; }
        }

        /* ===== FULLSCREEN: keep modal & toast inside the fullscreen element ===== */
        #videoPlayerWrapper:fullscreen .party-modal-backdrop,
        #videoPlayerWrapper:-webkit-full-screen .party-modal-backdrop {
            position: absolute;
            inset: 0;
            z-index: 9000;
        }
        #videoPlayerWrapper:fullscreen #partyToast,
        #videoPlayerWrapper:-webkit-full-screen #partyToast {
            position: absolute;
            bottom: 5rem; left: 50%;
            z-index: 10000;
        }

        /* Viewer controls lock */
        .controls-locked .center-controls { opacity: 0.25; pointer-events: none; }
        .controls-locked .progress-bar-container { pointer-events: none; }
        .controls-locked #rewindButton,
        .controls-locked #forwardButton,
        .controls-locked #playPauseButton { pointer-events: none; }
    </style>
</head>
<body>
    <div class="video-player-wrapper" id="videoPlayerWrapper">
        <video id="moviePlayer" playsinline webkit-playsinline preload="auto" autoplay></video>

        <div class="custom-controls-overlay" id="customControlsOverlay">
            <div class="top-controls">

    <!-- Toast -->

    <!-- QR Code overlay -->
    <div id="qrOverlay" style="display:none;position:absolute;inset:0;z-index:9500;
        background:rgba(0,0,0,0.82);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
        align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:24px;box-sizing:border-box;">

            max-width:300px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.6);">

            <div id="qrCanvas" style="background:#fff;border-radius:12px;padding:10px;display:inline-block;line-height:0;margin-bottom:14px;"></div>
            <div style="font-size:0.78rem;color:rgba(255,255,255,0.4);line-height:1.4;">Scan to join on another device</div>
        </div>
        <button id="btnCloseQr" style="background:rgba(255,255,255,0.08);border:1px solid #444;border-radius:12px;
            color:rgba(255,255,255,0.7);font-size:0.9rem;font-weight:600;padding:10px 28px;cursor:pointer;
            font-family:'Inter',sans-serif;transition:background 0.15s;">
            Close
        </button>
    </div>

    </div><!-- end .video-player-wrapper -->

    <script>
        // ===================== ORIGINAL PLAYER CODE =====================
        const moviePlayer = document.getElementById('moviePlayer');
        const customControlsOverlay = document.getElementById('customControlsOverlay');
        const playPauseButton = document.getElementById('playPauseButton');
        const playPauseIcon = playPauseButton.querySelector('i');
        const loadingSpinner = playPauseButton.querySelector('.spinner-border');
        const rewindButton = document.getElementById('rewindButton');
        const forwardButton = document.getElementById('forwardButton');
        const progressBarContainer = document.getElementById('progressBarContainer');
        const progressBar = document.getElementById('progressBar');
        const progressBarHandle = document.getElementById('progressBarHandle');
        const timeDisplay = document.getElementById('timeDisplay');
        const backButton = document.getElementById('backButton');
        const videoPlayerWrapper = document.getElementById('videoPlayerWrapper');
        const fullscreenButton = document.getElementById('fullscreenButton');
        const fullscreenIcon = fullscreenButton.querySelector('i');
        const downloadButton = document.getElementById('downloadButton');
        const movieTitleDisplay = document.getElementById('movieTitleDisplay');
        const magnificationButton = document.getElementById('magnificationButton');
        const magnificationIcon = magnificationButton.querySelector('i');
        const castButton = document.getElementById('castButton');
        const volumeButton = document.getElementById('volumeButton');
        const volumeIcon = volumeButton.querySelector('i');
        const volumeSlider = document.getElementById('volumeSlider');

        let zoomLevel = 1;
        let lastVolume = 1;
        let isDraggingProgressBar = false;
        let controlsTimeout;
        const FADE_TIMEOUT_SECONDS = 7;
        let lastTapTime = 0;
        const DOUBLE_TAP_THRESHOLD_MS = 300;
        const SEEK_TIME = 10;
        let movieKey;
        const CACHE_KEY = 'thirai_continue_watching';

        function saveToContinueWatching(movie) {
            let history = JSON.parse(localStorage.getItem(CACHE_KEY)) || [];
            history = history.filter(item => item.url !== movie.url);
            history.unshift(movie);
            if (history.length > 20) history.pop();
            localStorage.setItem(CACHE_KEY, JSON.stringify(history));
        }

        function formatTime(seconds) {
            if (isNaN(seconds) || seconds < 0) return "00:00";
            seconds = Math.floor(seconds);
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const remainingSeconds = seconds % 60;
            const pad = (num) => String(num).padStart(2, '0');
            if (hours > 0) return `${pad(hours)}:${pad(minutes)}:${pad(remainingSeconds)}`;
            return `${pad(minutes)}:${pad(remainingSeconds)}`;
        }

        function showControls() {
            customControlsOverlay.classList.add('visible');
            clearTimeout(controlsTimeout);
            if (!moviePlayer.paused && !moviePlayer.ended) {
                controlsTimeout = setTimeout(() => {
                    customControlsOverlay.classList.remove('visible');
                }, FADE_TIMEOUT_SECONDS * 1000);
            }
        }

        function hideControls() {
            customControlsOverlay.classList.remove('visible');
            clearTimeout(controlsTimeout);
        }

        function toggleControls() {
            if (customControlsOverlay.classList.contains('visible')) {
                hideControls();
            } else {
                showControls();
            }
        }

        moviePlayer.addEventListener('loadedmetadata', () => {
            if (moviePlayer.paused || moviePlayer.ended || moviePlayer.currentTime === 0) showControls();
            if (moviePlayer.readyState < 3) {
                playPauseIcon.style.display = 'none';
                loadingSpinner.style.display = 'block';
                playPauseButton.disabled = true;
                rewindButton.disabled = true;
                forwardButton.disabled = true;
            }
            if (movieKey) {
                const savedTime = localStorage.getItem(movieKey);
                if (savedTime) moviePlayer.currentTime = parseFloat(savedTime);
            }
        });

        moviePlayer.addEventListener('timeupdate', () => {
            updateProgressBar();
            if (movieKey && !moviePlayer.ended && moviePlayer.currentTime > 0) {
                localStorage.setItem(movieKey, moviePlayer.currentTime.toString());
            }
            // Host sends sync every ~2s
            if (party.isHost && party.roomId && !isSyncingFromRemote) {
                const now = Date.now();
                if (now - party.lastSyncSent > 2000) {
                    party.lastSyncSent = now;
                    party.socket.emit('sync-video', {
                        roomId: party.roomId,
                        state: moviePlayer.paused ? 'paused' : 'playing',
                        time: moviePlayer.currentTime
                    });
                }
            }
        });

        videoPlayerWrapper.addEventListener('click', (event) => {
            const currentTime = new Date().getTime();
            const clickedOnControl = event.target.closest('.control-button') ||
                                     event.target.closest('.top-button') ||
                                     event.target.closest('.progress-bar-container') ||
                                     event.target.closest('.movie-title-display') ||
                                     event.target.closest('.volume-container');
            if (!clickedOnControl && (currentTime - lastTapTime > DOUBLE_TAP_THRESHOLD_MS)) toggleControls();
        });

        playPauseButton.addEventListener('click', () => {
            if (party.roomId && !party.isHost) return; // guests cannot control playback
            if (moviePlayer.paused || moviePlayer.ended) {
                moviePlayer.play();
            } else {
                moviePlayer.pause();
            }
            showControls();
        });

        rewindButton.addEventListener('click', () => {
            if (party.roomId && !party.isHost) return;
            if (!rewindButton.disabled) {
                moviePlayer.currentTime = Math.max(0, moviePlayer.currentTime - SEEK_TIME);
                showControls();
            }
        });

        forwardButton.addEventListener('click', () => {
            if (party.roomId && !party.isHost) return;
            if (!forwardButton.disabled) {
                moviePlayer.currentTime = Math.min(moviePlayer.duration, moviePlayer.currentTime + SEEK_TIME);
                showControls();
            }
        });

        function updateVolumeIcon(volume) {
            volumeIcon.className = '';
            if (volume === 0 || moviePlayer.muted) {
                volumeIcon.classList.add('bi', 'bi-volume-mute-fill');
            } else if (volume < 0.5) {
                volumeIcon.classList.add('bi', 'bi-volume-down-fill');
            } else {
                volumeIcon.classList.add('bi', 'bi-volume-up-fill');
            }
        }

        volumeSlider.addEventListener('input', (e) => {
            const volume = parseFloat(e.target.value);
            moviePlayer.volume = volume;
            moviePlayer.muted = volume === 0;
            updateVolumeIcon(volume);
            showControls();
        });

        volumeButton.addEventListener('click', () => {
            if (moviePlayer.muted || moviePlayer.volume === 0) {
                moviePlayer.muted = false;
                moviePlayer.volume = lastVolume || 1;
                volumeSlider.value = lastVolume || 1;
            } else {
                lastVolume = moviePlayer.volume;
                moviePlayer.muted = true;
                moviePlayer.volume = 0;
                volumeSlider.value = 0;
            }
            updateVolumeIcon(moviePlayer.volume);
            showControls();
        });

        moviePlayer.addEventListener('waiting', () => {
            playPauseIcon.style.display = 'none';
            loadingSpinner.style.display = 'block';
            playPauseButton.disabled = true; rewindButton.disabled = true; forwardButton.disabled = true;
            showControls();
        });

        moviePlayer.addEventListener('playing', () => {
            loadingSpinner.style.display = 'none'; playPauseIcon.style.display = 'block';
            playPauseButton.disabled = false; rewindButton.disabled = false; forwardButton.disabled = false;
            playPauseIcon.classList.remove('bi-play-fill'); playPauseIcon.classList.add('bi-pause-fill');
            showControls();
        });

        moviePlayer.addEventListener('canplay', () => {
            if (loadingSpinner.style.display === 'block') {
                loadingSpinner.style.display = 'none'; playPauseIcon.style.display = 'block';
                playPauseButton.disabled = false; rewindButton.disabled = false; forwardButton.disabled = false;
            }
            updateProgressBar();
        });

        moviePlayer.addEventListener('play', () => {
            playPauseIcon.classList.remove('bi-play-fill'); playPauseIcon.classList.add('bi-pause-fill');
            loadingSpinner.style.display = 'none'; playPauseIcon.style.display = 'block';
            showControls();
            // Host broadcasts play to all guests
            if (party.isHost && party.roomId && !isSyncingFromRemote) {
                party.socket.emit('sync-video', { roomId: party.roomId, state: 'playing', time: moviePlayer.currentTime });
            }
        });

        moviePlayer.addEventListener('pause', () => {
            playPauseIcon.classList.remove('bi-pause-fill'); playPauseIcon.classList.add('bi-play-fill');
            loadingSpinner.style.display = 'none'; playPauseIcon.style.display = 'block';
            showControls();
            // Host broadcasts pause to all guests
            if (party.isHost && party.roomId && !isSyncingFromRemote) {
                party.socket.emit('sync-video', { roomId: party.roomId, state: 'paused', time: moviePlayer.currentTime });
            }
        });

        moviePlayer.addEventListener('ended', () => {
            playPauseIcon.classList.remove('bi-pause-fill'); playPauseIcon.classList.add('bi-play-fill');
            loadingSpinner.style.display = 'none'; playPauseIcon.style.display = 'block';
            showControls();
            if (movieKey) localStorage.removeItem(movieKey);
        });

        function updateProgressBar() {
            if (!isNaN(moviePlayer.duration) && moviePlayer.duration > 0) {
                const progress = (moviePlayer.currentTime / moviePlayer.duration) * 100;
                progressBar.style.width = `${progress}%`;
                progressBarHandle.style.left = `${progress}%`;
            }
            timeDisplay.textContent = `${formatTime(moviePlayer.currentTime)} / ${formatTime(moviePlayer.duration)}`;
        }

        progressBarContainer.addEventListener('mousedown', (e) => {
            if (party.roomId && !party.isHost) return;
            if (moviePlayer.readyState >= 2) { isDraggingProgressBar = true; progressBarContainer.classList.add('dragging'); updateSeek(e); showControls(); }
        });
        progressBarContainer.addEventListener('touchstart', (e) => {
            if (party.roomId && !party.isHost) return;
            if (moviePlayer.readyState >= 2) { isDraggingProgressBar = true; progressBarContainer.classList.add('dragging'); updateSeek(e.touches[0]); showControls(); }
        });
        document.addEventListener('mousemove', (e) => { if (isDraggingProgressBar) updateSeek(e); });
        document.addEventListener('touchmove', (e) => { if (isDraggingProgressBar) updateSeek(e.touches[0]); });
        document.addEventListener('mouseup', () => {
            if (isDraggingProgressBar) { isDraggingProgressBar = false; progressBarContainer.classList.remove('dragging'); showControls(); }
        });
        document.addEventListener('touchend', () => {
            if (isDraggingProgressBar) { isDraggingProgressBar = false; progressBarContainer.classList.remove('dragging'); showControls(); }
        });

        function updateSeek(e) {
            const rect = progressBarContainer.getBoundingClientRect();
            let clientX = e.clientX || e.pageX;
            clientX = Math.max(rect.left, Math.min(clientX, rect.right));
            const percent = (clientX - rect.left) / rect.width;
            if (!isNaN(moviePlayer.duration)) moviePlayer.currentTime = moviePlayer.duration * percent;
            updateProgressBar();
        }

        backButton.addEventListener('click', () => { window.history.back(); });

        fullscreenButton.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                if (videoPlayerWrapper.requestFullscreen) videoPlayerWrapper.requestFullscreen();
                else if (videoPlayerWrapper.webkitRequestFullscreen) videoPlayerWrapper.webkitRequestFullscreen();
                else if (videoPlayerWrapper.msRequestFullscreen) videoPlayerWrapper.msRequestFullscreen();
            }
            showControls();

                                     event.target.closest('.volume-container');
            if (clickedOnControl) return;
            if (moviePlayer.paused || moviePlayer.ended || moviePlayer.readyState < 2) {
                const currentTime = new Date().getTime();
                if (currentTime - lastTapTime > DOUBLE_TAP_THRESHOLD_MS) toggleControls();
                lastTapTime = currentTime; return;
            }
            const currentTime = new Date().getTime();
            const tapX = event.changedTouches[0].clientX;
            if (currentTime - lastTapTime < DOUBLE_TAP_THRESHOLD_MS) {
                const videoWidth = videoPlayerWrapper.offsetWidth;
                if (tapX < videoWidth / 2) moviePlayer.currentTime = Math.max(0, moviePlayer.currentTime - SEEK_TIME);
                else moviePlayer.currentTime = Math.min(moviePlayer.duration, moviePlayer.currentTime + SEEK_TIME);
                lastTapTime = 0; showControls();

        async function fetchMovieSource() {

            const filmCode = urlParams.get('film');
            let movieUrl = urlParams.get('url');
            if (filmCode) movieUrl = `https://einthusan.tv/movie/watch/${filmCode}/`;

            if (movieUrl) {
                try {
                    const response = await fetch(`https://api.thirai.me/watch?url=${encodeURIComponent(movieUrl)}`);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const data = await response.json();
                    if (data && data.video_url) {
                        moviePlayer.src = data.video_url;
                        moviePlayer.load();
                        downloadButton.href = data.video_url;
                        downloadButton.style.display = 'flex';
                        movieTitleDisplay.textContent = data.title;
                        document.title = data.title;
                        _posterUrl = data.img_url || '';
                        const filmCode2 = urlParams.get('film');
                        const cleanCacheUrl = filmCode2 ? `./watch?film=${filmCode2}` : `./watch`;
                        const cacheObj = { title: data.title, img: data.img_url || 'https://via.placeholder.com/400x600?text=No+Image', url: cleanCacheUrl };
                        saveToContinueWatching(cacheObj);
                        movieKey = `movie_progress_${data.title}`;
                        const savedTime = localStorage.getItem(movieKey);
                        if (savedTime) moviePlayer.currentTime = parseFloat(savedTime);
                        updateProgressBar();
                    } else {
                        loadingSpinner.style.display = 'none'; playPauseIcon.style.display = 'block';
                    }

                    loadingSpinner.style.display = 'none'; playPauseIcon.style.display = 'block';

        async function previewRoom(roomId) {
            if (!roomId || roomId.length < 6) return;
            _previewRoomId = roomId;

            // Show loading on both lobby card and quickjoin card
            ['qj', 'lb'].forEach(prefix => {
                const cardEl = document.getElementById(prefix + 'MovieCard');
                if (!cardEl) return;
                cardEl.style.display = 'flex';
                document.getElementById(prefix + 'Title').textContent = 'Loading…';
                document.getElementById(prefix + 'Time').textContent = '—';
                document.getElementById(prefix + 'CodeVal').textContent = roomId;
                document.getElementById(prefix + 'Poster').classList.add('no-img');
            });

            try {
                await connectSocket();
                const data = await new Promise((resolve, reject) => {
                    const timeout = setTimeout(() => reject(new Error('timeout')), 5000);
                    party.socket.emit('join-room', { roomId, userName: 'Preview_User' });
                    party.socket.once('joined-room', (d) => {
                        clearTimeout(timeout);
                        party.socket.emit('leave-room', { roomId });
                        resolve(d);
                    });
                    party.socket.once('error', () => { clearTimeout(timeout); reject(new Error('not found')); });
                });

                if (_previewRoomId !== roomId) return;

                let title = 'Watching'; let poster = '';
                if (data && data.movieUrl) {
                    try {
                        const u = new URL(data.movieUrl);
                        const filmCode = u.searchParams.get('film');
                        if (filmCode) {
                            const res = await fetch(`https://api.thirai.me/watch?url=${encodeURIComponent('https://einthusan.tv/movie/watch/' + filmCode + '/')}`);
                            if (res.ok) { const d = await res.json(); if (d.title) title = d.title; if (d.img_url) poster = d.img_url; }
                        }
                    } catch(e) {}
                }

                ['qj', 'lb'].forEach(prefix => {
                    const cardEl = document.getElementById(prefix + 'MovieCard');
                    if (!cardEl) return;
                    cardEl.style.display = 'flex';
                    document.getElementById(prefix + 'Title').textContent = title;
                    document.getElementById(prefix + 'Time').textContent = '—';
                    _setCardStatus(document.getElementById(prefix + 'Dot'), document.getElementById(prefix + 'StatusText'), 'live');
                    const posterEl = document.getElementById(prefix + 'Poster');
                    if (poster) { posterEl.src = poster; posterEl.classList.remove('no-img'); } else { posterEl.classList.add('no-img'); }
                    _makeCopyCode(document.getElementById(prefix + 'CodeVal'), document.getElementById(prefix + 'CodeHint'), roomId);
                });

            } catch(e) {
                if (_previewRoomId !== roomId) return;
                ['qj', 'lb'].forEach(prefix => {
                    const t = document.getElementById(prefix + 'Title');
                    if (t) t.textContent = 'Room not found';
                });
            }

        function connectSocket() {
            if (party.socket && party.socket.connected) return Promise.resolve();
            return new Promise((resolve) => {
                party.socket = io(BACKEND, { transports: ['websocket', 'polling'] });
                party.socket.on('connect', () => resolve());
                party.socket.on('connect_error', () => showToast('⚠️ Connection failed'));

                party.socket.on('user-list', (users) => {
                    renderUsers(users);
                });

                party.socket.on('video-update', (data) => {
                    if (party.isHost) return;
                    isSyncingFromRemote = true;
                    clearTimeout(syncTimeout);
                    const diff = Math.abs(moviePlayer.currentTime - data.time);
                    if (diff > 1.5) moviePlayer.currentTime = data.time;
                    if (data.state === 'playing' && moviePlayer.paused) {
                        _nativePlay().catch(() => {}); // use native — guest wrapper would block this
                    } else if (data.state === 'paused' && !moviePlayer.paused) {
                        moviePlayer.pause();
                    }
                    setSyncState(true, 'Live');
                    syncTimeout = setTimeout(() => { isSyncingFromRemote = false; }, 500);
                });

                party.socket.on('party-ended', () => {
                    showToast('🎬 The host ended the party');
                    leavePartyCleanup();
                    showScreen('lobby');
                    openModal();
                });

                party.socket.on('error', (msg) => { showToast('❌ ' + msg); });
            });

        async function joinParty(code, name) {
            const roomId = (code || inputJoinCode.value).trim().toUpperCase();
            if (!roomId) { showToast('Enter a room code'); return; }
            const myName = (name || inputQuickName.value || inputMyName.value).trim() || 'Guest';
            party.myName = myName;
            localStorage.setItem('thirai_party_name', myName);
            inputMyName.value = myName; inputQuickName.value = myName;

            // Pause video while connecting — don't let it play in the background
            moviePlayer.pause();

            btnJoinParty.disabled = true; btnJoinParty.textContent = 'Joining…';
            btnQuickJoin.disabled = true; btnQuickJoin.innerHTML = '<i class="bi bi-hourglass-split"></i> Joining…';

            await connectSocket();
            party.roomId = roomId;
            party.isHost = false;

            party.socket.emit('join-room', { roomId, userName: myName });

            party.socket.once('joined-room', (data) => {
                // If the host is on a different movie, redirect there first
                if (data && data.movieUrl) {
                    const hostUrl = new URL(data.movieUrl);
                    const currentUrl = new URL(window.location.href);
                    const hostFilm = hostUrl.searchParams.get('film');
                    const myFilm = currentUrl.searchParams.get('film');
                    if (hostFilm && hostFilm !== myFilm) {
                        hostUrl.searchParams.set('party', roomId);
                        hostUrl.searchParams.set('name', myName);
                        window.location.href = hostUrl.toString();
                        return;
                    }
                }
                partyRoleLabel.textContent = 'VIEWER';
                leaveLabel.textContent = 'Leave Party';
                partyShareLink.value = buildInviteLink(roomId);
                setSyncState(true, 'Syncing');
                setViewerLock(true);

                showToast('✅ Joined the party!');
                closeModal();
            });

            // Timeout fallback — resume video and reset
            setTimeout(() => {
                if (!screenParty.classList.contains('active')) {
                    btnJoinParty.disabled = false; btnJoinParty.textContent = 'Join Party';
                    btnQuickJoin.disabled = false; btnQuickJoin.innerHTML = '<i class="bi bi-play-fill"></i> Join & Watch';
                    party.roomId = null;
                    moviePlayer.play().catch(() => {}); // resume since join failed
                    showToast('❌ Room not found');
                }
            }, 5000);
        }

        function generateQR(text, container) {
            container.innerHTML = '';
            const size = 200;
            const canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size;
            canvas.style.borderRadius = '8px';
            container.appendChild(canvas);
            window.drawQRToCanvas(text, canvas);
        }

        btnShowQr.addEventListener('click', () => {
            const link = partyShareLink.value;
            if (!link) return;
            document.getElementById('qrMovieTitle').textContent = movieTitleDisplay.textContent || 'Watch Party';
            document.getElementById('qrRoomCode').textContent = party.roomId || '';
            generateQR(link, document.getElementById('qrCanvas'));
            qrOverlay.style.display = 'flex';
        });

        btnCloseQr.addEventListener('click', () => { qrOverlay.style.display = 'none'; });
        qrOverlay.addEventListener('click', (e) => { if (e.target === qrOverlay) qrOverlay.style.display = 'none'; });

        partyModalBackdrop.addEventListener('click', (e) => {
            if (e.target !== partyModalBackdrop) return;
            moviePlayer.play().catch(()=>{});
            closeModal();
        });

        // Enter key shortcuts
        inputJoinCode.addEventListener('keydown', (e) => { if (e.key === 'Enter') joinParty(); });
        inputMyName.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { if (inputJoinCode.value.trim()) joinParty(); else createParty(); }
        });
        inputQuickName.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') btnQuickJoin.click();
        });

        // Sync on seek (host only)
        moviePlayer.addEventListener('seeked', () => {
            if (party.isHost && party.roomId && !isSyncingFromRemote) {
                party.socket.emit('sync-video', {
                    roomId: party.roomId,
                    state: moviePlayer.paused ? 'paused' : 'playing',
                    time: moviePlayer.currentTime
                });
            }
        });

        // Auto-join from URL ?party=CODE&name=NAME
        function _autoJoinParty(code, nameFromUrl) {
            _pendingQuickJoinCode = code.toUpperCase();

            // If &name= was in URL, skip the prompt and join silently
            if (nameFromUrl) {
                const cleanName = decodeURIComponent(nameFromUrl).trim();
                if (cleanName) {
                    inputQuickName.value = cleanName;
                    inputMyName.value = cleanName;
                    localStorage.setItem('thirai_party_name', cleanName);
                    joinParty(_pendingQuickJoinCode, cleanName);
                    return;
                }
            }

            // No name — show quick-join name prompt + preview the room's movie
            const savedN = localStorage.getItem('thirai_party_name') || '';
            inputQuickName.value = savedN;
            document.getElementById('quickJoinSubtitle').textContent =
                `Room ${_pendingQuickJoinCode} — enter your name to join.`;
            // Hide card until preview loads
            const qjCard = document.getElementById('qjMovieCard');
            if (qjCard) qjCard.style.display = 'none';
            showScreen('quickjoin');
            openModal();
            // Kick off preview in background — card appears when data arrives
            previewRoom(_pendingQuickJoinCode);
        }
    </script>
</body>
</html>
