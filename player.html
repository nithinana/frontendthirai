<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Thirai - Select Server</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        :root {
            --primary: #0d6efd;
            --rakan-orange: #ff8c00;
            --bg: #0a0a0a;
            --card-bg: #161616;
            --text: #e0e0e0;
            --accent: #00ff88;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        .top-nav {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.9);
            position: fixed;
            top: 0; width: 100%; z-index: 100;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }

        .back-btn {
            font-size: 1.5rem;
            color: #fff;
            text-decoration: none;
            cursor: pointer;
        }

        /* --- CONTENT WRAPPER --- */
        .content-container {
            margin-top: 80px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #movie-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 5px;
            text-align: center;
            color: #fff;
        }

        #episode-info {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 30px;
        }

        /* --- TV SELECTOR --- */
        #tv-selector {
            display: none;
            gap: 10px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 500px;
        }

        select {
            flex: 1;
            padding: 12px;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }

        /* --- SERVER GRID --- */
        .server-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 800px;
        }

        .server-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .server-card:hover {
            border-color: var(--rakan-orange);
            transform: translateY(-3px);
            background: #1f1f1f;
        }

        .server-card i {
            font-size: 2rem;
            color: var(--rakan-orange);
        }

        /* --- UNLOCK SCREEN --- */
        #unlock-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(15px);
        }

        .code-container {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .code-input {
            width: 50px;
            height: 60px;
            background: #222;
            border: 2px solid #444;
            border-radius: 10px;
            text-align: center;
            font-size: 2rem;
            color: #fff;
            font-weight: bold;
        }

        .code-input:focus {
            border-color: var(--rakan-orange);
            outline: none;
        }

        /* --- PLAYER OVERLAY --- */
        #player-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 2000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        #ui-nav {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 2100;
            display: none;
            gap: 15px;
        }

        .nav-btn {
            background: rgba(0,0,0,0.6);
            border: none;
            color: #fff;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        /* --- EPISODE DRAWER --- */
        #episodes-drawer {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 80vh;
            background: #111;
            z-index: 3000;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            transition: bottom 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        #episodes-drawer.open {
            bottom: 0;
        }

        .drawer-header {
            padding: 20px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #drawer-ep-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }

        .ep-card {
            display: flex;
            gap: 15px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .ep-card:hover { background: #222; }

        .ep-card.active {
            border: 1px solid var(--rakan-orange);
            background: #1f1f1f;
        }

        .ep-thumb {
            width: 120px;
            aspect-ratio: 16/9;
            background-size: cover;
            background-position: center;
            border-radius: 6px;
            background-color: #333;
            flex-shrink: 0;
        }

        .ep-meta {
            flex: 1;
            overflow: hidden;
        }

        .ep-title {
            font-weight: 600;
            margin-bottom: 4px;
            color: #fff;
        }

        .ep-desc {
            font-size: 0.85rem;
            color: #888;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .scroll-controls {
            position: absolute;
            right: 20px;
            bottom: 20px;
            display: flex;
            gap: 10px;
        }

        @media (max-width: 600px) {
            .server-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="index.html" class="back-btn"><i class="bi bi-chevron-left"></i></a>
        <div style="font-weight: 800; color: var(--rakan-orange); font-size: 1.2rem;">THIRAI</div>
        <div style="width: 24px;"></div>
    </div>

    <div class="content-container" id="selection-screen">
        <h1 id="movie-title">Loading...</h1>
        <p id="episode-info"></p>

        <div id="tv-selector">
            <select id="s-select" onchange="fetchEpisodes()"></select>
            <select id="e-select" onchange="updateSelection()"></select>
        </div>

        <div class="server-grid">
            <div class="server-card" onclick="selectServer(1)">
                <i class="bi bi-rocket-takeoff-fill"></i>
                <span>Rakan (Fast)</span>
            </div>
            <div class="server-card" onclick="selectServer(6)">
                <i class="bi bi-link-45deg"></i>
                <span>Ryze (Multi)</span>
            </div>
            <div class="server-card" onclick="selectServer(3)">
                <i class="bi bi-shield-check"></i>
                <span>Xayah</span>
            </div>
            <div class="server-card" onclick="selectServer(2)">
                <i class="bi bi-lightning-fill"></i>
                <span>Bard</span>
            </div>
            <div class="server-card" onclick="selectServer(9)">
                <i class="bi bi-collection-play"></i>
                <span>Server 111</span>
            </div>
            <div class="server-card" onclick="selectServer(7)">
                <i class="bi bi-crown-fill"></i>
                <span>Vidking</span>
            </div>
        </div>
    </div>

    <div id="ui-nav">
        <button class="nav-btn" onclick="closePlayer()"><i class="bi bi-x-lg"></i></button>
        <button class="nav-btn" id="episodes-btn" style="display:none;" onclick="toggleEpisodesDrawer()"><i class="bi bi-stack"></i></button>
    </div>

    <div id="player-screen"></div>

    <div id="unlock-screen">
        <h2 style="color: var(--rakan-orange);">Enter Access Pin</h2>
        <p>This server requires authentication</p>
        <div class="code-container">
            <input type="number" class="code-input" maxlength="1">
            <input type="number" class="code-input" maxlength="1">
            <input type="number" class="code-input" maxlength="1">
            <input type="number" class="code-input" maxlength="1">
        </div>
        <p id="error-msg" style="color: #ff4444; margin-top: 20px; display: none;">Invalid PIN. Please try again.</p>
    </div>

    <div id="episodes-drawer">
        <div class="drawer-header">
            <select id="drawer-s-select" style="max-width: 150px;" onchange="syncAndFetch(this.value)"></select>
            <div style="display: flex; gap: 10px;">
                <button class="nav-btn" id="scroll-up-btn" onclick="scrollEpisodes('up')"><i class="bi bi-chevron-up"></i></button>
                <button class="nav-btn" id="scroll-down-btn" onclick="scrollEpisodes('down')"><i class="bi bi-chevron-down"></i></button>
                <button class="nav-btn" onclick="toggleEpisodesDrawer()"><i class="bi bi-x-lg"></i></button>
            </div>
        </div>
        <div id="drawer-ep-list"></div>
    </div>

    <script>
        const PIN = "1451";
        const TMDB_KEY = "926e94b0f70b5bed8417b679652366ab";
        const CACHE_KEY = 'thirai_continue_watching';

        const SERVERS = {
            1: { name: "rakan", movie: "https://vidsrc.cc/v2/embed/movie/", tv: "https://vidsrc.cc/v2/embed/tv/", secure: true },
            2: { name: "bard", movie: "https://moviesapi.club/movie/", tv: "https://moviesapi.club/tv/", secure: false },
            3: { name: "xayah", movie: "https://vidsrc.me/embed/movie?tmdb=", tv: "https://vidsrc.me/embed/tv?tmdb/", secure: false },
            4: { name: "ekko", movie: "https://player.videasy.net/movie/", tv: "https://player.videasy.net/tv/", secure: false },
            5: { name: "naafiri", movie: "https://vidfast.pro/movie/", tv: "https://vidfast.pro/tv/", secure: false },
            6: { name: "ryze", movie: "https://vidlink.pro/movie/", tv: "https://vidlink.pro/tv/", secure: false },
            7: { name: "vidking", movie: "https://www.vidking.net/embed/movie/", tv: "https://www.vidking.net/embed/tv/", secure: true },
            8: { name: "vidfast", movie: "https://vidfast.pro/movie/", tv: "https://vidfast.pro/tv/", secure: false },
            9: { name: "111", movie: "https://111movies.net/movie/", tv: "https://111movies.net/tv/", secure: false }
        };

        let selectedServerId = null;
        let videoData = { type: null, id: null, s: 1, e: 1, title: "", img: "" };
        let currentEpisodes = [];
        let isAutoLaunched = false;

        // --- CACHE LOGIC ---
        function saveToContinueWatching(movie) {
            let history = JSON.parse(localStorage.getItem(CACHE_KEY)) || [];
            history = history.filter(item => item.url !== movie.url);
            history.unshift(movie);
            if (history.length > 20) history.pop();
            localStorage.setItem(CACHE_KEY, JSON.stringify(history));
        }

        function triggerCacheSave() {
            const serverName = selectedServerId ? SERVERS[selectedServerId].name : 'rakan';
            let customUrl = "";
            let displayTitle = videoData.title;
            
            if (videoData.type === 'movie') {
                customUrl = `./player.html?server=${serverName}&movie=${videoData.id}`;
            } else {
                customUrl = `./player.html?server=${serverName}&tv=${videoData.id}/${videoData.s}/${videoData.e}`;
                displayTitle += ` (S${videoData.s}E${videoData.e})`;
            }

            const cacheObj = {
                title: displayTitle,
                img: videoData.img || 'https://via.placeholder.com/500x750?text=No+Poster',
                url: customUrl
            };
            saveToContinueWatching(cacheObj);
        }

        // --- TMDB FETCHING ---
        async function parseUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const tvParam = urlParams.get('tv');
            const movieParam = urlParams.get('movie');
            const serverParam = urlParams.get('server');

            if (tvParam) {
                const parts = tvParam.split('/');
                videoData.type = 'tv';
                videoData.id = parts[0];
                videoData.s = parts[1] || 1;
                videoData.e = parts[2] || 1;
                document.getElementById('tv-selector').style.display = 'flex';
                document.getElementById('episodes-btn').style.display = 'flex';
                await fetchShowDetails();
            } else if (movieParam) {
                videoData.type = 'movie';
                videoData.id = movieParam;
                await fetchMovieDetails();
            }

            if (serverParam && videoData.id) {
                const sId = Object.keys(SERVERS).find(key => SERVERS[key].name.toLowerCase() === serverParam.toLowerCase());
                if (sId) {
                    isAutoLaunched = true;
                    selectServer(parseInt(sId));
                }
            }
        }

        async function fetchShowDetails() {
            try {
                const res = await fetch(`https://api.themoviedb.org/3/tv/${videoData.id}?api_key=${TMDB_KEY}`);
                const data = await res.json();
                videoData.title = data.name;
                videoData.img = `https://image.tmdb.org/t/p/w500${data.poster_path}`;
                document.getElementById('movie-title').innerText = data.name;
                
                const sSelect = document.getElementById('s-select');
                const drawerSSelect = document.getElementById('drawer-s-select');
                sSelect.innerHTML = '';
                drawerSSelect.innerHTML = '';
                
                data.seasons.forEach(s => {
                    if (s.season_number > 0) {
                        const opt = document.createElement('option');
                        opt.value = s.season_number;
                        opt.textContent = `Season ${s.season_number}`;
                        if (s.season_number == videoData.s) opt.selected = true;
                        sSelect.appendChild(opt);
                        drawerSSelect.appendChild(opt.cloneNode(true));
                    }
                });
                await fetchEpisodes();
            } catch (e) { console.error(e); }
        }

        async function fetchEpisodes() {
            const s = document.getElementById('s-select').value;
            videoData.s = s;
            try {
                const res = await fetch(`https://api.themoviedb.org/3/tv/${videoData.id}/season/${s}?api_key=${TMDB_KEY}`);
                const data = await res.json();
                currentEpisodes = data.episodes;
                
                const eSelect = document.getElementById('e-select');
                const drawerEpList = document.getElementById('drawer-ep-list');
                eSelect.innerHTML = '';
                drawerEpList.innerHTML = '';

                data.episodes.forEach(ep => {
                    const opt = document.createElement('option');
                    opt.value = ep.episode_number;
                    opt.textContent = `E${ep.episode_number}: ${ep.name}`;
                    if (ep.episode_number == videoData.e) opt.selected = true;
                    eSelect.appendChild(opt);

                    const card = document.createElement('div'); 
                    card.className = `ep-card ${ep.episode_number == videoData.e ? 'active' : ''}`;
                    card.id = `ep-card-${ep.episode_number}`;
                    const thumbUrl = ep.still_path ? `https://image.tmdb.org/t/p/w300${ep.still_path}` : '';
                    card.innerHTML = `
                        <div class="ep-thumb" style="background-image: url('${thumbUrl}')"></div>
                        <div class="ep-meta">
                            <div class="ep-title">E${ep.episode_number}: ${ep.name}</div>
                            <div class="ep-desc">${ep.overview || 'No description available.'}</div>
                        </div>
                    `;
                    card.onclick = () => {
                        videoData.e = ep.episode_number;
                        eSelect.value = ep.episode_number;
                        updateSelection();
                        toggleEpisodesDrawer();
                        if (document.getElementById('player-screen').style.display === 'block') launchStream();
                    };
                    drawerEpList.appendChild(card);
                });
                updateSelection();
                setTimeout(updateScrollButtons, 100);
            } catch (e) { console.error(e); }
        }

        async function fetchMovieDetails() {
            try {
                const res = await fetch(`https://api.themoviedb.org/3/movie/${videoData.id}?api_key=${TMDB_KEY}`);
                const data = await res.json();
                videoData.title = data.title;
                videoData.img = `https://image.tmdb.org/t/p/w500${data.poster_path}`;
                document.getElementById('movie-title').innerText = data.title;
                document.getElementById('episode-info').innerText = "";
            } catch (e) { console.error(e); }
        }

        // --- CORE UI ACTIONS ---
        function selectServer(id) {
            selectedServerId = id;
            if (localStorage.getItem('isUnlocked') === 'true') {
                launchStream();
            } else {
                document.getElementById('unlock-screen').style.display = 'flex';
                document.querySelectorAll('.code-input')[0].focus();
            }
        }

        function launchStream() {
            const server = SERVERS[selectedServerId];
            let url = "";
            if (videoData.type === 'movie') {
                url = server.movie + videoData.id;
            } else {
                if (selectedServerId === 3) url = `${server.tv}${videoData.id}&season=${videoData.s}&episode=${videoData.e}`;
                else if (selectedServerId === 2) url = `${server.tv}${videoData.id}-${videoData.s}-${videoData.e}`;
                else url = `${server.tv}${videoData.id}/${videoData.s}/${videoData.e}`;
            }

            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('unlock-screen').style.display = 'none';
            document.getElementById('ui-nav').style.display = 'flex';
            
            const playerDiv = document.getElementById('player-screen');
            playerDiv.style.display = 'block';
            playerDiv.innerHTML = `<iframe id="movie-iframe" src="${url}" allowfullscreen="true" allow="autoplay; encrypted-media" ${server.secure ? 'sandbox="allow-scripts allow-same-origin allow-forms"' : ''}></iframe>`;
            
            triggerCacheSave();

            const currentUrl = new URL(window.location.href);
            currentUrl.searchParams.set('server', server.name);
            window.history.replaceState({}, '', currentUrl.toString());
        }

        function updateSelection() {
            if (videoData.type === 'tv') {
                videoData.e = document.getElementById('e-select').value;
                document.getElementById('episode-info').innerText = `Season ${videoData.s}, Episode ${videoData.e}`;
            }
        }

        function syncAndFetch(val) {
            document.getElementById('s-select').value = val;
            fetchEpisodes();
        }

        function toggleEpisodesDrawer() {
            const drawer = document.getElementById('episodes-drawer');
            drawer.classList.toggle('open');
            if (drawer.classList.contains('open')) {
                setTimeout(() => {
                    const activeCard = document.querySelector('.ep-card.active');
                    if (activeCard) activeCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    updateScrollButtons();
                }, 300);
            }
        }

        function scrollEpisodes(dir) {
            const list = document.getElementById('drawer-ep-list');
            const amt = dir === 'up' ? -300 : 300;
            list.scrollBy({ top: amt, behavior: 'smooth' });
        }

        function updateScrollButtons() {
            const list = document.getElementById('drawer-ep-list');
            document.getElementById('scroll-up-btn').style.opacity = list.scrollTop <= 0 ? '0.3' : '1';
            document.getElementById('scroll-down-btn').style.opacity = (list.scrollHeight - list.scrollTop <= list.clientHeight + 1) ? '0.3' : '1';
        }

        function closePlayer() {
            location.reload();
        }

        // --- PIN HANDLER ---
        document.querySelectorAll('.code-input').forEach((el, i, arr) => {
            el.addEventListener('input', () => {
                if (el.value && i < arr.length - 1) arr[i+1].focus();
                const code = Array.from(arr).map(inp => inp.value).join('');
                if (code.length === 4) {
                    if (code === PIN) {
                        localStorage.setItem('isUnlocked', 'true');
                        launchStream();
                    } else {
                        document.getElementById('error-msg').style.display = 'block';
                        arr.forEach(inp => inp.value = '');
                        arr[0].focus();
                    }
                }
            });
            el.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !el.value && i > 0) arr[i-1].focus();
            });
        });

        const epListContainer = document.getElementById('drawer-ep-list');
        epListContainer.addEventListener('scroll', () => { requestAnimationFrame(updateScrollButtons); });
        window.addEventListener('resize', updateScrollButtons);

        window.onload = () => { parseUrl(); };
        (function() { window.open = function() { return null; }; })();
    </script>
</body>
</html>
